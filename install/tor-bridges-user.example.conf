# Пример: мосты obfs4 + обычные (не коммитить секреты с прод-серверов).
# Установка: sudo apt install obfs4proxy
# Подключение: sudo cp … /etc/tor/torrc.d/60-rbt-user-bridges.conf && sudo systemctl restart tor@default
# Уже используется UseBridges из других файлов torrc.d; здесь только ClientTransportPlugin и Bridge.
# webtunnel (п.8 в исходном списке) не добавлен — нужен полный url=… и пакет/плагин webtunnel.
ClientTransportPlugin obfs4 exec /usr/bin/obfs4proxy

