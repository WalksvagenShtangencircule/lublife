<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата услуг</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f0f0f0;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        .loader {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .error {
            color: #b00020;
            text-align: center;
            padding: 20px;
            background: #ffeaea;
            border-radius: 5px;
        }
        .contract-item {
            background: #f9f9f9;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border-left: 4px solid #007cba;
            cursor: pointer;
        }
        .contract-item:hover {
            background: #f0f0f0;
        }
        .no-contracts {
            text-align: center;
            padding: 20px;
            color: #666;
            background: #f9f9f9;
            border-radius: 5px;
        }
        .amount-form label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
        }
        .amount-form input[type="number"] {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            margin-top: 6px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        .amount-form button {
            margin-top: 16px;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: #007cba;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .amount-form button:disabled {
            background: #999;
            cursor: not-allowed;
        }
        .hint {
            font-size: 13px;
            color: #666;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Оплата услуг</h2>
        <div id="loader" class="loader">Загрузка...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="content" style="display: none;"></div>
    </div>

    <script>
        var isAndroid = window.navigator.userAgent.toLowerCase().includes("android");

        postLoadingStarted = function() {
            if (isAndroid) {
                Android.postLoadingStarted();
            } else if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.loadingStartedHandler) {
                window.webkit.messageHandlers.loadingStartedHandler.postMessage({ "loading": "started" });
            }
        };

        postLoadingFinished = function() {
            if (isAndroid) {
                Android.postLoadingFinished();
            } else if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.loadingFinishedHandler) {
                window.webkit.messageHandlers.loadingFinishedHandler.postMessage({ "loading": "finished" });
            }
        };

        if (isAndroid) {
            bearerToken = function() {
                return Android.bearerToken();
            };
        }

        /** Запрос к lk.lubnet.ru через nginx (тот же origin — без CORS). */
        function buildLkRequestUrl(account, paysumm) {
            var base = "/external-lk/website.jsp";
            var params = new URLSearchParams();
            params.set("action", "sbplinkastrus");
            params.set("account", account);
            params.set("paysumm", String(paysumm));
            return base + "?" + params.toString();
        }

        function parseAmount(raw) {
            var n = parseInt(String(raw).trim(), 10);
            if (!Number.isFinite(n) || n < 1) {
                return null;
            }
            if (n > 500000) {
                return null;
            }
            return n;
        }

        async function main() {
            postLoadingStarted();
            try {
                document.getElementById("loader").textContent = "Получение токена...";
                var token = bearerToken();
                if (!token) {
                    throw new Error("Токен авторизации не получен");
                }

                document.getElementById("loader").textContent = "Получение списка квартир...";
                var flats = await getFlats(token);
                if (flats.length === 0) {
                    showError("У вас нет доступных квартир");
                    return;
                }

                document.getElementById("loader").textContent = "Поиск договоров...";
                var contracts = await getContractsForFlats(token, flats);
                if (contracts.length === 0) {
                    showNoContracts();
                    return;
                }

                if (contracts.length === 1) {
                    showAmountForm(contracts[0]);
                } else {
                    showContractsList(contracts);
                }
            } catch (error) {
                showError("Ошибка: " + error.message);
            } finally {
                postLoadingFinished();
            }
        }

        async function getFlats(token) {
            var response = await fetch("/mobile/address/getSettingsList", {
                method: "POST",
                headers: { "Authorization": "Bearer " + token }
            });
            if (!response.ok) {
                throw new Error("Ошибка при получении списка квартир: " + response.status);
            }
            var data = await response.json();
            if (data.code !== 200) {
                throw new Error("Ошибка сервера: " + (data.message || data.name));
            }
            return data.data || [];
        }

        async function getContractsForFlats(token, flats) {
            var contracts = [];
            for (var i = 0; i < flats.length; i++) {
                var flat = flats[i];
                try {
                    var contract = await getContractForFlat(token, flat.flatId);
                    if (contract && contract.indexOf("error:") !== 0 && contract.length > 0) {
                        contracts.push({
                            flatId: flat.flatId,
                            contractName: contract,
                            address: flat.address,
                            flatNumber: flat.flatNumber
                        });
                    }
                } catch (e) {
                    console.log("flatId " + flat.flatId + ": " + e.message);
                }
            }
            return contracts;
        }

        async function getContractForFlat(token, flatId) {
            var response = await fetch("/api/contract/getContract?flatId=" + flatId, {
                method: "GET",
                headers: { "Authorization": "Bearer " + token }
            });
            if (!response.ok) {
                throw new Error("Ошибка API: " + response.status);
            }
            return await response.text();
        }

        /**
         * Запрос JSON у ЛК через прокси /external-lk/…
         * Успех: { "error": false, "sbplink": "https://..." }
         * Ошибка: { "error": true, "reason": "..." }
         */
        async function requestPaymentLink(account, paysumm) {
            var url = buildLkRequestUrl(account, paysumm);
            var response = await fetch(url);
            if (!response.ok) {
                throw new Error("Платёжный шлюз недоступен: HTTP " + response.status);
            }
            var text = await response.text();
            var data;
            try {
                data = JSON.parse(text);
            } catch (e) {
                throw new Error("Некорректный ответ шлюза");
            }
            if (data.error === true || data.error === "true") {
                throw new Error(data.reason || data.message || "Ошибка шлюза");
            }
            if (!data.sbplink) {
                throw new Error("Платёжная система не вернула ссылку для оплаты");
            }
            return data.sbplink;
        }

        function showAmountForm(contract) {
            var content = document.getElementById("content");
            var loader = document.getElementById("loader");
            loader.style.display = "none";
            content.style.display = "block";

            var addr = contract.address || "";
            var flatNo = contract.flatNumber != null ? ", кв. " + contract.flatNumber : "";

            content.innerHTML =
                '<div class="amount-form">' +
                "<p><strong>Договор:</strong> " + escapeHtml(contract.contractName) + "</p>" +
                "<p><strong>Адрес:</strong> " + escapeHtml(addr + flatNo) + "</p>" +
                '<label for="payAmount">Сумма оплаты, ₽</label>' +
                '<input type="number" id="payAmount" min="1" max="500000" step="1" value="100" inputmode="numeric" />' +
                '<p class="hint">Введите целое число рублей от 1 до 500&nbsp;000.</p>' +
                '<button type="button" id="payBtn">Перейти к оплате</button>' +
                "</div>";

            document.getElementById("payBtn").addEventListener("click", async function() {
                var raw = document.getElementById("payAmount").value;
                var sum = parseAmount(raw);
                if (sum === null) {
                    alert("Укажите корректную сумму (целое число от 1 до 500000).");
                    return;
                }
                var btn = document.getElementById("payBtn");
                btn.disabled = true;
                btn.textContent = "Получение ссылки...";
                try {
                    var link = await requestPaymentLink(contract.contractName, sum);
                    window.location.href = link;
                } catch (err) {
                    btn.disabled = false;
                    btn.textContent = "Перейти к оплате";
                    alert("Ошибка: " + err.message);
                }
            });
        }

        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        function showContractsList(contracts) {
            var content = document.getElementById("content");
            var loader = document.getElementById("loader");
            loader.style.display = "none";
            content.style.display = "block";
            content.innerHTML = "<h3>Выберите договор</h3>";

            contracts.forEach(function(contract) {
                var el = document.createElement("div");
                el.className = "contract-item";
                el.innerHTML =
                    "<strong>Договор: " + escapeHtml(contract.contractName) + "</strong><br>" +
                    "<small>Адрес: " + escapeHtml(contract.address || "") + "</small>";
                el.addEventListener("click", function() {
                    content.innerHTML = "";
                    showAmountForm(contract);
                });
                content.appendChild(el);
            });
        }

        function showNoContracts() {
            var content = document.getElementById("content");
            var loader = document.getElementById("loader");
            loader.style.display = "none";
            content.style.display = "block";
            content.innerHTML =
                '<div class="no-contracts">' +
                "<h3>Договоры не найдены</h3>" +
                "<p>Для ваших квартир не найдено активных договоров.</p>" +
                "<p>Обратитесь в техническую поддержку.</p>" +
                "</div>";
        }

        function showError(message) {
            document.getElementById("loader").style.display = "none";
            var err = document.getElementById("error");
            err.style.display = "block";
            err.textContent = message;
        }

        document.addEventListener("DOMContentLoaded", function() {
            setTimeout(main, 100);
        });
    </script>
</body>
</html>
