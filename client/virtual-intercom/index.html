<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Вызов с панели</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, .14);
            --glass-border: rgba(255, 255, 255, .32);
            --ink: #12081c;
            --muted: rgba(255, 255, 255, .78);
            --digit-on: #5cffe8;
            --digit-dim: rgba(92, 255, 232, .28);
        }
        * { box-sizing: border-box; }
        @keyframes hue-flow {
            0% { background-position: 0% 40%; }
            50% { background-position: 100% 60%; }
            100% { background-position: 0% 40%; }
        }
        @keyframes floaty {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(6%, -4%) scale(1.05); }
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Outfit", system-ui, sans-serif;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            background: linear-gradient(
                130deg,
                #ff006e 0%,
                #7b2cbf 22%,
                #4361ee 48%,
                #06ffa5 78%,
                #ffbe0b 100%
            );
            background-size: 320% 320%;
            animation: hue-flow 14s ease-in-out infinite;
        }
        @media (prefers-reduced-motion: reduce) {
            body { animation: none; background-size: 100% 100%; }
            .deco-blob { animation: none !important; }
        }
        .wrap {
            position: relative;
            width: 100%;
            max-width: 360px;
        }
        .deco-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: .55;
            pointer-events: none;
            z-index: 0;
        }
        .deco-blob.a {
            width: 180px;
            height: 180px;
            top: -50px;
            right: -40px;
            background: #ff5c8a;
            animation: floaty 9s ease-in-out infinite;
        }
        .deco-blob.b {
            width: 140px;
            height: 140px;
            bottom: -30px;
            left: -30px;
            background: #48cae4;
            animation: floaty 11s ease-in-out infinite reverse;
        }
        .panel {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            padding: 26px 20px 22px;
            border-radius: 28px;
            background: var(--glass);
            -webkit-backdrop-filter: blur(22px);
            backdrop-filter: blur(22px);
            border: 1px solid var(--glass-border);
            box-shadow:
                0 24px 60px rgba(20, 0, 40, .35),
                inset 0 1px 0 rgba(255, 255, 255, .35);
        }
        .panel-badge {
            display: inline-flex;
            align-items: center;
            align-self: center;
            gap: 6px;
            padding: 6px 12px;
            margin: 0 0 14px;
            border-radius: 999px;
            font-size: .68rem;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .92);
            background: rgba(0, 0, 0, .18);
            border: 1px solid rgba(255, 255, 255, .22);
        }
        .panel-badge-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #06ffa5;
            box-shadow: 0 0 10px #06ffa5;
        }
        .panel-head {
            text-align: center;
        }
        h1 {
            font-size: 1.35rem;
            font-weight: 800;
            margin: 0 0 6px;
            line-height: 1.2;
            letter-spacing: -.02em;
            text-shadow: 0 2px 18px rgba(0, 0, 0, .2);
        }
        .sub {
            font-size: .88rem;
            font-weight: 500;
            color: var(--muted);
            margin: 0 0 18px;
            line-height: 1.4;
        }
        .display-wrap {
            border-radius: 18px;
            padding: 3px;
            margin-bottom: 18px;
            background: linear-gradient(135deg, rgba(255, 255, 255, .45), rgba(255, 255, 255, .08));
            box-shadow: 0 12px 28px rgba(0, 0, 0, .18);
        }
        .display {
            border-radius: 15px;
            padding: 14px 16px;
            font-family: "JetBrains Mono", ui-monospace, monospace;
            font-size: 1.7rem;
            font-weight: 600;
            letter-spacing: .14em;
            text-align: right;
            min-height: 54px;
            font-variant-numeric: tabular-nums;
            color: var(--digit-on);
            background: linear-gradient(165deg, #1a0a2e 0%, #0d0620 100%);
            text-shadow: 0 0 16px rgba(92, 255, 232, .65);
            border: 1px solid rgba(92, 255, 232, .25);
        }
        .display.is-placeholder {
            color: var(--digit-dim);
            text-shadow: none;
        }
        .keys {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 11px;
        }
        button.key {
            aspect-ratio: 1;
            border: none;
            border-radius: 18px;
            padding: 0;
            font-size: 1.25rem;
            font-weight: 800;
            font-family: inherit;
            color: #fff;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, .28);
            box-shadow:
                0 6px 0 rgba(0, 0, 0, .22),
                0 10px 20px rgba(0, 0, 0, .15),
                inset 0 1px 0 rgba(255, 255, 255, .35);
            transition: transform .08s ease, box-shadow .08s ease, filter .15s ease;
        }
        button.key:hover {
            filter: brightness(1.06);
        }
        button.key:active {
            transform: translateY(4px);
            box-shadow:
                0 2px 0 rgba(0, 0, 0, .2),
                inset 0 2px 8px rgba(0, 0, 0, .2);
        }
        /* Цифры 1–9: три цветных ряда */
        .keys > button.key:nth-child(1),
        .keys > button.key:nth-child(2),
        .keys > button.key:nth-child(3) {
            background: linear-gradient(145deg, #ff6b6b, #ee5a24);
        }
        .keys > button.key:nth-child(4),
        .keys > button.key:nth-child(5),
        .keys > button.key:nth-child(6) {
            background: linear-gradient(145deg, #a855f7, #6366f1);
        }
        .keys > button.key:nth-child(7),
        .keys > button.key:nth-child(8),
        .keys > button.key:nth-child(9) {
            background: linear-gradient(145deg, #22d3ee, #0ea5e9);
        }
        /* Кнопка B — вызов */
        button.key.call {
            background: linear-gradient(145deg, #34d399, #059669) !important;
            font-size: 1.1rem;
            letter-spacing: .04em;
        }
        /* Цифра 0 */
        .keys > button.key:nth-child(11) {
            background: linear-gradient(145deg, #fbbf24, #f59e0b);
            color: #1a1003;
        }
        /* Кнопка C — сброс */
        .keys > button.key:nth-child(12) {
            background: linear-gradient(145deg, #fb7185, #db2777);
        }
        button.call:disabled {
            opacity: 0.38;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(.25);
        }
        button.hangup {
            display: none;
            width: 100%;
            margin-top: 14px;
            border: none;
            border-radius: 16px;
            padding: 14px 0;
            font-size: .95rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(145deg, #f43f5e, #be123c);
            border: 1px solid rgba(255, 255, 255, .25);
            box-shadow: 0 5px 0 rgba(120, 20, 50, .5), inset 0 1px 0 rgba(255, 255, 255, .25);
        }
        button.hangup:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(120, 20, 50, .45); }
        .status {
            margin-top: 14px;
            font-size: .78rem;
            font-weight: 500;
            color: rgba(255, 255, 255, .82);
            min-height: 2.2em;
            text-align: center;
        }
        .err {
            color: #ffe4e6;
            font-size: .85rem;
            font-weight: 600;
            margin-top: 8px;
            text-align: center;
            text-shadow: 0 0 12px rgba(244, 63, 94, .45);
        }
        #remoteAudio { display: none; }
        @media (max-width: 360px) {
            .panel { padding: 22px 16px 18px; }
            .display { font-size: 1.45rem; }
            button.key { font-size: 1.12rem; border-radius: 16px; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="deco-blob a" aria-hidden="true"></div>
        <div class="deco-blob b" aria-hidden="true"></div>
        <div class="panel">
            <div class="panel-badge"><span class="panel-badge-dot"></span> Виртуальная панель</div>
            <div class="panel-head">
                <h1 id="titleLine">Домофон</h1>
                <div class="sub" id="subLine">Наберите номер квартиры</div>
            </div>
            <div class="display-wrap">
                <div class="display is-placeholder" id="disp">—</div>
            </div>
            <div class="keys" id="keys"></div>
            <button type="button" class="hangup" id="hangupBtn" aria-label="Отбой">Отбой</button>
            <div class="status" id="status"></div>
            <audio id="remoteAudio" autoplay playsinline></audio>
            <div class="err" id="err"></div>
        </div>
    </div>
    <script src="/js/jssip.min.js"></script>
    <script>
(function () {
    function apiRoot() {
        const p = window.location.pathname;
        const idx = p.indexOf('/frontend/');
        if (idx === 0) return window.location.origin + '/api';
        if (idx > 0) return window.location.origin + p.substring(0, idx) + '/api';
        return window.location.origin + '/api';
    }

    const params = new URLSearchParams(window.location.search);
    const slug = params.get('t');
    const statusEl = document.getElementById('status');
    const errEl = document.getElementById('err');
    const dispEl = document.getElementById('disp');
    const keysEl = document.getElementById('keys');
    const remoteAudio = document.getElementById('remoteAudio');
    const hangupBtn = document.getElementById('hangupBtn');

    function setErr(t) { errEl.textContent = t || ''; }
    function setStatus(t) { statusEl.textContent = t || ''; }

    if (!slug) {
        setErr('Неверная ссылка: нет кода доступа.');
        return;
    }

    let digits = '';
    let manifest = null;
    let ua = null;
    let session = null;
    let callBtnEl = null;

    function renderDisp() {
        dispEl.textContent = digits ? digits : '—';
        if (digits) {
            dispEl.classList.remove('is-placeholder');
        } else {
            dispEl.classList.add('is-placeholder');
        }
    }

    function addDigit(d) {
        if (digits.length >= 12) return;
        digits += d;
        renderDisp();
    }

    function buildKeys() {
        const nums = ['1','2','3','4','5','6','7','8','9'];
        nums.forEach(function (n) {
            const b = document.createElement('button');
            b.type = 'button';
            b.className = 'key';
            b.textContent = n;
            b.setAttribute('aria-label', 'Цифра ' + n);
            b.addEventListener('click', function () { addDigit(n); });
            keysEl.appendChild(b);
        });
        const call = document.createElement('button');
        call.type = 'button';
        call.className = 'key call';
        call.textContent = 'B';
        call.setAttribute('aria-label', 'Вызов');
        call.title = 'Вызов';
        call.addEventListener('click', placeCall);
        keysEl.appendChild(call);
        const zero = document.createElement('button');
        zero.type = 'button';
        zero.className = 'key';
        zero.textContent = '0';
        zero.setAttribute('aria-label', 'Цифра 0');
        zero.addEventListener('click', function () { addDigit('0'); });
        keysEl.appendChild(zero);
        const clr = document.createElement('button');
        clr.type = 'button';
        clr.className = 'key';
        clr.textContent = 'C';
        clr.setAttribute('aria-label', 'Сброс');
        clr.title = 'Сброс';
        clr.addEventListener('click', function () { digits = ''; renderDisp(); });
        keysEl.appendChild(clr);
        callBtnEl = call;
    }

    function attachRemoteMedia(stream) {
        if (!stream || !remoteAudio) return;
        try {
            var at = stream.getAudioTracks();
            if (at.length) {
                remoteAudio.srcObject = new MediaStream(at);
                remoteAudio.play().catch(function () {});
            }
        } catch (e) {}
    }

    function setCallButtonLocked(locked) {
        if (callBtnEl) {
            callBtnEl.disabled = !!locked;
        }
    }

    function sessionIsActive() {
        return session && !session.isEnded();
    }

    function setCallUi(active) {
        if (hangupBtn) {
            hangupBtn.style.display = active ? 'block' : 'none';
        }
    }

    function issueDoorTokensFetch() {
        return fetch(apiRoot() + '/vdom/issueDoorTokens', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({ t: slug }),
        }).then(function (r) {
            return r.json().then(function (body) {
                if (!r.ok) {
                    throw new Error((body && body.error) ? body.error : 'issueDoorTokens');
                }
                return body.doors || [];
            });
        });
    }

    function wireDoorDtmf(sess) {
        if (!sess || sess._doorDtmfWired) {
            return;
        }
        sess._doorDtmfWired = true;
        sess.on('accepted', function () {
            issueDoorTokensFetch().
                then(function (doors) {
                    var map = {};
                    if (doors && doors.length) {
                        for (var i = 0; i < doors.length; i++) {
                            var d = doors[i];
                            if (d && d.digit && d.token) {
                                map[String(d.digit)] = d.token;
                            }
                        }
                    }
                    sess._doorDigitToToken = map;
                }).
                catch(function () {});
        });
        sess.on('newDTMF', function (data) {
            var map = sess._doorDigitToToken || {};
            var tone = (data && data.dtmf && data.dtmf.tone) ? String(data.dtmf.tone) : '';
            var tok = map[tone];
            if (!tok) {
                return;
            }
            delete map[tone];
            fetch(apiRoot() + '/vdom/openDoorOnce/' + encodeURIComponent(tok), { method: 'GET', headers: { 'Accept': 'application/json' } }).
                then(function (r) {
                    return r.json().catch(function () {
                        return {};
                    });
                }).
                then(function (j) {
                    if (j && j.ok) {
                        setErr('');
                        setStatus('Открытие: команда отправлена');
                    } else {
                        setErr((j && j.error) ? ('Открытие: ' + j.error) : 'Открытие не удалось');
                    }
                }).
                catch(function () {
                    setErr('Открытие: ошибка сети');
                });
        });
    }

    function hangup() {
        if (session) {
            try { delete session._doorDigitToToken; } catch (e) {}
            try { delete session._doorDtmfWired; } catch (e1) {}
        }
        if (session && !session.isEnded()) {
            try { session.terminate(); } catch (e2) {}
        }
        session = null;
        setCallUi(false);
        setCallButtonLocked(false);
        try { remoteAudio.srcObject = null; } catch (e3) {}
    }

    function rtcOptionsForCall() {
        var iceGatherDone = false;
        function signalIceReady(ev) {
            if (iceGatherDone) return;
            iceGatherDone = true;
            try { ev.ready(); } catch (e) {}
        }
        return {
            mediaConstraints: { audio: true, video: false },
            pcConfig: {
                iceServers: manifest.ice || [],
                iceCandidatePoolSize: 10,
            },
            rtcOfferConstraints: { offerToReceiveAudio: true, offerToReceiveVideo: false },
            eventHandlers: {
                icecandidate: function (event) {
                    if (!event.candidate) {
                        signalIceReady(event);
                        return;
                    }
                    var c = event.candidate;
                    if (c.type === 'srflx' && c.relatedAddress != null && c.relatedPort != null) {
                        signalIceReady(event);
                    }
                },
            },
        };
    }

    function placeCall() {
        setErr('');
        if (!ua || !ua.isRegistered()) {
            setErr('Нет соединения с сервером вызовов.');
            return;
        }
        if (!digits || digits.length < 1) {
            setErr('Введите номер квартиры.');
            return;
        }
        if (sessionIsActive()) {
            setErr('Вызов уже идёт. Дождитесь окончания или нажмите «Отбой».');
            return;
        }
        setStatus('Вызов…');
        const ext = digits;
        const opt = rtcOptionsForCall();
        try {
            session = ua.call('sip:' + ext + '@' + manifest.sipDomain, opt);
        } catch (e) {
            setCallButtonLocked(false);
            setStatus('');
            setErr('Не удалось начать вызов.');
            return;
        }
        setCallUi(true);
        setCallButtonLocked(true);
        session.on('accepted', function () {
            setStatus('Соединено');
        });
        session.on('confirmed', function () {
            setStatus('Разговор');
        });
        session.on('ended', function () {
            setStatus('Завершено');
            hangup();
        });
        session.on('failed', function (e) {
            setStatus('');
            setErr('Вызов не удался: ' + (e.cause || 'ошибка'));
            hangup();
        });
        session.on('getusermediafailed', function () {
            setStatus('');
            setErr('Не удалось получить доступ к микрофону.');
            hangup();
        });
        session.connection.addEventListener('addstream', function (ev) {
            attachRemoteMedia(ev.stream);
        });
        session.connection.addEventListener('track', function (ev) {
            if (ev.streams && ev.streams[0]) {
                attachRemoteMedia(ev.streams[0]);
            }
        });
        wireDoorDtmf(session);
    }

    function wireIncomingSession(sess) {
        sess.on('getusermediafailed', function () {
            setStatus('');
            setErr('Не удалось получить доступ к микрофону.');
            hangup();
        });
        sess.on('accepted', function () { setStatus('Соединено'); });
        sess.on('confirmed', function () { setStatus('Разговор'); });
        sess.on('ended', function () {
            setStatus('Завершено');
            session = null;
            hangup();
        });
        sess.on('failed', function (e) {
            setStatus('');
            setErr('Входящий: ' + (e.cause || 'ошибка'));
            session = null;
            hangup();
        });
        sess.connection.addEventListener('addstream', function (ev) {
            attachRemoteMedia(ev.stream);
        });
        sess.connection.addEventListener('track', function (ev) {
            if (ev.streams && ev.streams[0]) {
                attachRemoteMedia(ev.streams[0]);
            }
        });
        wireDoorDtmf(sess);
    }

    function explainManifestError(status, bodyText) {
        let code = '';
        try {
            const j = JSON.parse(bodyText);
            if (j && j.error) {
                code = String(j.error);
            }
        } catch (e) {}
        if (code === 'noToken' || code === 'tokenNotFound') {
            return 'Сервер не распознал публичный метод (часто из‑за регистра в URL или другого входного скрипта для /api). Обновите backend; путь должен быть …/api/vdom/guestManifest';
        }
        if (code === 'notConfigured') {
            return 'На сервере не заданы ws/sipDomain для Asterisk (client/config/config.json → asterisk).';
        }
        if (code === 'notFound') {
            return 'Неверный код доступа или панель отключена.';
        }
        if (code) {
            return 'Ошибка API: ' + code + (status ? ' (' + status + ')' : '');
        }
        return 'HTTP ' + (status || '?');
    }

    fetch(apiRoot() + '/vdom/guestManifest?t=' + encodeURIComponent(slug))
        .then(function (r) {
            return r.text().then(function (txt) {
                if (!r.ok) {
                    throw new Error(explainManifestError(r.status, txt));
                }
                try {
                    return JSON.parse(txt);
                } catch (e) {
                    throw new Error('Ответ сервера не JSON');
                }
            });
        })
        .then(function (data) {
            manifest = data;
            if (!manifest || !manifest.sipUser || !manifest.sipPassword || !manifest.ws || !manifest.sipDomain) {
                throw new Error('Неполный ответ сервера');
            }
            if (manifest.panelName) {
                document.getElementById('titleLine').textContent = manifest.panelName;
            }
            buildKeys();
            renderDisp();
            if (hangupBtn) {
                hangupBtn.addEventListener('click', function () {
                    setErr('');
                    hangup();
                    if (ua && ua.isRegistered()) {
                        setStatus('Готов к вызову');
                    }
                });
            }
            if (typeof JsSIP === 'undefined') throw new Error('JsSIP не загружен');
            JsSIP.debug.disable('JsSIP:*');
            ua = new JsSIP.UA({
                sockets: [ new JsSIP.WebSocketInterface(manifest.ws) ],
                uri: 'sip:' + manifest.sipUser + '@' + manifest.sipDomain,
                password: manifest.sipPassword,
                sessionTimers: false,
            });
            ua.on('registered', function () {
                setStatus('Готов к вызову');
            });
            ua.on('registrationFailed', function (e) {
                setErr('Регистрация SIP не удалась: ' + (e.cause || ''));
            });
            ua.on('newRTCSession', function (e) {
                var sess = e.session;
                if (sess.direction !== 'incoming') {
                    return;
                }
                if (session && session !== sess && !session.isEnded()) {
                    try { sess.terminate(); } catch (x) {}
                    return;
                }
                session = sess;
                setCallUi(true);
                setCallButtonLocked(true);
                setStatus('Входящий вызов…');
                setErr('');
                wireIncomingSession(sess);
                try {
                    sess.answer(rtcOptionsForCall());
                } catch (err) {
                    setErr('Не удалось ответить');
                    try { sess.terminate(); } catch (x2) {}
                }
            });
            ua.start();
        })
        .catch(function (e) {
            setErr(e.message || 'Ошибка загрузки');
        });
})();
    </script>
</body>
</html>
