<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Личный кабинет старшего</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <style>
    body { background: #f4f6f9; }
    .ev-row { border-bottom: 1px solid #dee2e6; padding: 8px 0; }
    .ev-prev { max-width: 120px; max-height: 68px; object-fit: cover; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="app" class="container py-3" style="max-width:900px"></div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
(function () {
  /**
   * База REST: в конфиге обычно frontend = …/frontend, api = …/api.
   * Страница ЛК лежит под /frontend/house-senior/ или /house-senior/ — запросы должны идти на /api, а не на /frontend.
   */
  function apiRoot() {
    try {
      var href = window.location.href;
      var path = window.location.pathname || "";
      if (path.indexOf("/frontend/") !== -1) {
        return String(new URL("../../api", href)).replace(/\/+$/, "");
      }
      if (path.indexOf("/house-senior/") !== -1) {
        return String(new URL("../api", href)).replace(/\/+$/, "");
      }
    } catch (e) {}
    var o = window.location.origin;
    return o + "/api";
  }

  function qs(name) {
    var m = new RegExp("[?&]" + name + "=([^&]*)").exec(window.location.search);
    return m ? decodeURIComponent(m[1].replace(/\+/g, " ")) : "";
  }
  var slug = qs("t") || qs("slug") || "";
  var token = sessionStorage.getItem("os_token") || "";
  var me = null;

  /** API отдаёт плоский JSON; иногда обёртка { "200": { … } } или ошибка { "403": { "error": "…" } }. */
  function unwrap200(j) {
    if (!j || typeof j !== "object") return null;
    if (Object.prototype.hasOwnProperty.call(j, "200") && j["200"] != null && typeof j["200"] === "object") {
      return j["200"];
    }
    return j;
  }

  function firstErrorPayload(j) {
    if (!j || typeof j !== "object") return "";
    if (typeof j.error === "string") return j.error;
    for (var k in j) {
      if (!Object.prototype.hasOwnProperty.call(j, k)) continue;
      var v = j[k];
      if (v && typeof v === "object" && typeof v.error === "string") return v.error;
    }
    return "";
  }

  function readSeniorAuthToken(u) {
    if (!u || typeof u !== "object") return "";
    var a = u.objectSeniorAuth;
    if (a && typeof a === "object" && a.token) return String(a.token);
    if (u.token) return String(u.token);
    return "";
  }

  function apiFetch(method, path, body) {
    var url = apiRoot() + path;
    var opts = {
      method: method,
      headers: {
        "Accept-Language": "ru",
        "Accept": "application/json, text/plain, */*",
      },
    };
    if (token) {
      opts.headers["Authorization"] = "Bearer " + token;
    }
    if (body !== undefined) {
      opts.headers["Content-Type"] = "application/json; charset=UTF-8";
      opts.body = JSON.stringify(body);
    }
    return fetch(url, opts).then(function (r) {
      return r.text().then(function (t) {
        var j = {};
        if (t) {
          try {
            j = JSON.parse(t);
          } catch (e) {
            j = { _nonJson: true, _snippet: String(t).substring(0, 240) };
          }
        }
        j._httpOk = r.ok;
        j._httpStatus = r.status;
        return j;
      });
    });
  }

  function renderLogin() {
    $("#app").html(
      "<h4 class=\"mb-3\">Вход в кабинет старшего</h4>" +
      "<div class=\"card card-body\">" +
      "<div class=\"form-group\"><label>Объект (slug из ссылки)</label>" +
      "<input type=\"text\" class=\"form-control\" id=\"os_slug\" value=\"" + $("<div>").text(slug).html() + "\" /></div>" +
      "<div class=\"form-group\"><label>Логин</label><input type=\"text\" class=\"form-control\" id=\"os_login\" autocomplete=\"username\" /></div>" +
      "<div class=\"form-group\"><label>Пароль</label><input type=\"password\" class=\"form-control\" id=\"os_pass\" autocomplete=\"current-password\" /></div>" +
      "<button type=\"button\" class=\"btn btn-primary\" id=\"os_btn\">Войти</button>" +
      "</div>"
    );
    $("#os_btn").on("click", function () {
      var s = $.trim($("#os_slug").val());
      var l = $.trim($("#os_login").val());
      var p = $("#os_pass").val();
      apiFetch("POST", "/objectSeniorAuth/login", { slug: s, login: l, password: p }).then(function (j) {
        if (!j._httpOk) {
          var err = firstErrorPayload(j) || firstErrorPayload(unwrap200(j)) || j._snippet;
          alert("Ошибка входа" + (err ? (": " + err) : "") + " (HTTP " + j._httpStatus + ")");
          return;
        }
        var u = unwrap200(j);
        var tok = readSeniorAuthToken(u);
        if (tok) {
          token = tok;
          sessionStorage.setItem("os_token", token);
          slug = s;
          boot();
        } else {
          alert("Ошибка входа: в ответе нет токена. Проверьте slug, логин и пароль.");
        }
      }).catch(function () { alert("Сеть: не удалось связаться с " + apiRoot()); });
    });
  }

  function boot() {
    apiFetch("GET", "/objectSenior/whoAmI", undefined).then(function (j) {
      if (!j._httpOk) {
        sessionStorage.removeItem("os_token");
        token = "";
        renderLogin();
        return;
      }
      var u = unwrap200(j);
      if (!u || !u.objectSenior) {
        sessionStorage.removeItem("os_token");
        token = "";
        renderLogin();
        return;
      }
      me = u.objectSenior;
      if (typeof me.can_view_events === "string") me.can_view_events = parseInt(me.can_view_events, 10) || 0;
      if (typeof me.can_manage_subscribers === "string") me.can_manage_subscribers = parseInt(me.can_manage_subscribers, 10) || 0;
      if (typeof me.can_manage_entrance_access === "string") me.can_manage_entrance_access = parseInt(me.can_manage_entrance_access, 10) || 0;
      renderApp();
    }).catch(function () {
      sessionStorage.removeItem("os_token");
      token = "";
      renderLogin();
    });
  }

  function renderApp() {
    var tabs = "<ul class=\"nav nav-tabs mb-3\">" +
      (me.can_view_events ? "<li class=\"nav-item\"><a class=\"nav-link active\" data-t=\"ev\" href=\"#\">События</a></li>" : "") +
      (me.can_manage_subscribers ? "<li class=\"nav-item\"><a class=\"nav-link\" data-t=\"su\" href=\"#\">Жильцы</a></li>" : "") +
      "<li class=\"nav-item\"><a class=\"nav-link\" data-t=\"pw\" href=\"#\">Пароль</a></li>" +
      "<li class=\"nav-item ml-auto\"><a class=\"nav-link text-danger\" id=\"os_logout\" href=\"#\">Выход</a></li></ul>";
    $("#app").html("<div class=\"mb-2 small text-muted\">" + $("<div>").text(me.houseFull || "").html() + "</div>" + tabs + "<div id=\"os_body\"></div>");
    $("#os_logout").on("click", function () {
      sessionStorage.removeItem("os_token");
      token = "";
      me = null;
      renderLogin();
    });
    $(".nav-link[data-t]").on("click", function (e) {
      e.preventDefault();
      $(".nav-link[data-t]").removeClass("active");
      $(this).addClass("active");
      var t = $(this).data("t");
      if (t === "ev") { loadEvents(); }
      else if (t === "su") { loadSubs(); }
      else if (t === "pw") { loadPw(); }
    });
    if (me.can_view_events) { loadEvents(); }
    else if (me.can_manage_subscribers) { loadSubs(); }
    else { loadPw(); }
  }

  function loadEvents() {
    $("#os_body").html("<p>Загрузка…</p>");
    var phone = "";
    apiFetch("GET", "/objectSenior/events?limit=80", undefined).then(function (j) {
      if (!j._httpOk) {
        var er = firstErrorPayload(j) || firstErrorPayload(unwrap200(j));
        $("#os_body").html("<p class=\"text-danger\">События: " + (er || ("HTTP " + j._httpStatus)) + "</p>");
        return;
      }
      var u = unwrap200(j);
      var pack = u && u.events ? u.events : null;
      if (!pack || !pack.events) {
        $("#os_body").html("<p>Нет данных (пустой список или нет прав на события).</p>");
        return;
      }
      var html = "<div class=\"mb-2\"><input type=\"text\" class=\"form-control form-control-sm d-inline-block w-auto\" id=\"os_phone\" placeholder=\"Телефон для поиска\"/> <button class=\"btn btn-sm btn-secondary\" id=\"os_phgo\">Поиск</button></div><div id=\"os_evlist\"></div>";
      $("#os_body").html(html);
      function draw(data) {
        var evs = data.events || [];
        var h = "";
        for (var i = 0; i < evs.length; i++) {
          var e = evs[i];
          var uuid = (e.event_uuid || "").toString();
          var line = (e.addressLine || "") + " · " + (e.eventUserPhone || "");
          h += "<div class=\"ev-row d-flex align-items-center\" data-uuid=\"" + $("<div>").text(uuid).html() + "\">" +
            "<div class=\"mr-2 os-prev\" style=\"min-width:120px;height:68px;background:#eee;border-radius:4px\"></div>" +
            "<div class=\"flex-grow-1\"><div class=\"small text-muted\">" + (e.date ? new Date(e.date * 1000).toLocaleString() : "") + "</div>" +
            "<div>" + $("<div>").text(line).html() + "</div>" +
            "<button type=\"button\" class=\"btn btn-link btn-sm os-vid\">Видео</button>" +
            "</div></div>";
        }
        $("#os_evlist").html(h || "<p>Нет событий</p>");
        $(".os-vid").on("click", function () {
          var row = $(this).closest(".ev-row");
          var id = row.data("uuid");
          apiFetch("GET", "/objectSenior/eventVideo/" + encodeURIComponent(id), undefined).then(function (vj) {
            var vu = unwrap200(vj);
            var u = vu && vu.eventVideo && vu.eventVideo.url;
            if (u) { window.open(u, "_blank"); }
            else { alert("Видео недоступно"); }
          });
        });
        $(".ev-row").each(function () {
          var row = $(this);
          var id = row.data("uuid");
          if (!id) return;
          apiFetch("GET", "/objectSenior/eventPreview/" + encodeURIComponent(id), undefined).then(function (pj) {
            var pju = unwrap200(pj);
            var pr = pju && pju.eventPreview;
            if (pr && pr.preview && pr.preview.base64) {
              row.find(".os-prev").html("<img class=\"ev-prev\" src=\"data:" + pr.preview.contentType + ";base64," + pr.preview.base64 + "\" alt=\"\"/>");
            }
          });
        });
      }
      draw(pack);
      $("#os_phgo").on("click", function () {
        phone = $.trim($("#os_phone").val());
        var q = phone ? ("?limit=80&phone=" + encodeURIComponent(phone)) : "?limit=80";
        apiFetch("GET", "/objectSenior/events" + q, undefined).then(function (j2) {
          var u2 = unwrap200(j2);
          var p2 = u2 && u2.events ? u2.events : null;
          if (p2) { draw(p2); }
        });
      });
    });
  }

  var flatsCache = [];

  function loadSubs() {
    $("#os_body").html("<p>Загрузка квартир…</p>");
    apiFetch("GET", "/objectSenior/flats", undefined).then(function (fj) {
      if (!fj._httpOk) {
        var er = firstErrorPayload(fj) || firstErrorPayload(unwrap200(fj));
        $("#os_body").html("<p class=\"text-danger\">Квартиры: " + (er || ("HTTP " + fj._httpStatus)) + "</p>");
        return;
      }
      var fu = unwrap200(fj);
      flatsCache = (fu && fu.flats) ? fu.flats : [];
      var opts = "<option value=\"\">— квартира —</option>";
      for (var i = 0; i < flatsCache.length; i++) {
        var f = flatsCache[i];
        opts += "<option value=\"" + f.flatId + "\">" + $("<div>").text("кв. " + (f.flat || f.flatId)).html() + "</option>";
      }
      $("#os_body").html(
        "<div class=\"row\"><div class=\"col-md-6\">" +
        "<label>Квартира</label><select id=\"os_flat\" class=\"form-control\">" + opts + "</select>" +
        "<button class=\"btn btn-sm btn-primary mt-2\" id=\"os_loadsub\">Список жильцов</button>" +
        "<div id=\"os_sublist\" class=\"mt-3\"></div></div>" +
        "<div class=\"col-md-6\"><h6>Добавить жильца</h6>" +
        "<input class=\"form-control mb-1\" id=\"os_mob\" placeholder=\"Телефон\"/>" +
        "<input class=\"form-control mb-1\" id=\"os_sn\" placeholder=\"Имя\"/>" +
        "<input class=\"form-control mb-1\" id=\"os_sp\" placeholder=\"Отчество\"/>" +
        "<input class=\"form-control mb-1\" id=\"os_sl\" placeholder=\"Фамилия\"/>" +
        "<div id=\"os_ent_wrap\" class=\"mb-2 small\">Подъезды: выберите квартиру</div>" +
        "<button class=\"btn btn-success btn-sm\" id=\"os_addsub\">Добавить</button></div></div>"
      );
      $("#os_flat").on("change", updEnt);
      function updEnt() {
        var fid = parseInt($("#os_flat").val(), 10);
        var h = "";
        var flat = flatsCache.find(function (x) { return x.flatId === fid; });
        if (flat && flat.entrances) {
          flat.entrances.forEach(function (e) {
            h += "<label class=\"d-block\"><input type=\"checkbox\" class=\"os_ent\" value=\"" + e.entranceId + "\"/> подъезд " + e.entranceId + "</label>";
          });
        }
        $("#os_ent_wrap").html(h || "Нет подъездов");
      }
      $("#os_loadsub").on("click", function () {
        var fid = parseInt($("#os_flat").val(), 10);
        if (!fid) { alert("Выберите квартиру"); return; }
        apiFetch("GET", "/objectSenior/subscribers?flatId=" + fid, undefined).then(function (sj) {
          var su = unwrap200(sj);
          var list = su && su.subscribers ? su.subscribers : [];
          var t = "<table class=\"table table-sm\"><thead><tr><th>Телефон</th><th>ФИО</th><th></th></tr></thead><tbody>";
          list.forEach(function (s) {
            t += "<tr><td>" + $("<div>").text(s.mobile || "").html() + "</td><td>" + $("<div>").text(s.subscriberFull || "").html() + "</td>" +
              "<td><button class=\"btn btn-link btn-sm os_del\" data-sid=\"" + s.subscriberId + "\" data-fid=\"" + fid + "\">Удалить</button></td></tr>";
          });
          t += "</tbody></table>";
          $("#os_sublist").html(t || "<p>Пусто</p>");
          $(".os_del").on("click", function () {
            var sid = $(this).data("sid");
            var ff = $(this).data("fid");
            if (!confirm("Удалить жильца из квартиры?")) return;
            apiFetch("DELETE", "/objectSenior/subscriber", { flatId: ff, subscriberId: sid }).then(function () {
              $("#os_loadsub").click();
            });
          });
        });
      });
      $("#os_addsub").on("click", function () {
        var fid = parseInt($("#os_flat").val(), 10);
        if (!fid) { alert("Квартира"); return; }
        var body = {
          flatId: fid,
          mobile: $.trim($("#os_mob").val()),
          subscriberName: $.trim($("#os_sn").val()),
          subscriberPatronymic: $.trim($("#os_sp").val()),
          subscriberLast: $.trim($("#os_sl").val()),
        };
        var eids = [];
        $(".os_ent:checked").each(function () { eids.push(parseInt($(this).val(), 10)); });
        if (eids.length) { body.entranceIds = eids; }
        apiFetch("POST", "/objectSenior/subscriber", body).then(function () {
          $("#os_loadsub").click();
        });
      });
    });
  }

  function loadPw() {
    $("#os_body").html(
      "<div class=\"card card-body\" style=\"max-width:400px\">" +
      "<div class=\"form-group\"><label>Старый пароль</label><input type=\"password\" class=\"form-control\" id=\"os_o\"/></div>" +
      "<div class=\"form-group\"><label>Новый пароль</label><input type=\"password\" class=\"form-control\" id=\"os_n\"/></div>" +
      "<button class=\"btn btn-primary\" id=\"os_pwbtn\">Сменить</button></div>"
    );
    $("#os_pwbtn").on("click", function () {
      apiFetch("PUT", "/objectSeniorAuth/password", { oldPassword: $("#os_o").val(), newPassword: $("#os_n").val() }).then(function (j) {
        var pu = unwrap200(j);
        if (pu && pu.objectSeniorAuth && pu.objectSeniorAuth.ok) { alert("Пароль изменён. Войдите снова."); sessionStorage.removeItem("os_token"); token = ""; renderLogin(); }
        else { alert("Ошибка"); }
      });
    });
  }

  if (token) { boot(); }
  else { renderLogin(); }
})();
  </script>
</body>
</html>
