<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ЛК Старших</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <style>
    :root {
      --wp-font: "Nunito", "Segoe UI", system-ui, -apple-system, sans-serif;
      --wp-bg: #f0f2f5;
      --wp-surface: #ffffff;
      --wp-surface-2: #e4e8ef;
      --wp-text: #1a1d23;
      --wp-text-muted: #5f6775;
      --wp-border: rgba(0, 0, 0, 0.1);
      --wp-accent: #2e3f7c;
      --wp-accent-hover: #1d2d5e;
      --wp-accent-soft: rgba(46, 63, 124, 0.1);
      --wp-navbar-bg: #ffffff;
      --wp-input-bg: #ffffff;
      --wp-shadow: 0 12px 36px rgba(46, 63, 124, 0.14);
      --wp-radius: 18px;
      --wp-radius-sm: 12px;
      --wp-btn-p1: #4c6aad;
      --wp-btn-p2: #3d5a99;
      --wp-btn-p3: #2e3f7c;
      --wp-btn-p-border: #1d2d5e;
      --wp-btn-p-shadow: 0 4px 0 #162247, 0 12px 26px rgba(46, 63, 124, 0.28);
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      font-family: var(--wp-font);
      color: var(--wp-text);
      background:
        radial-gradient(circle at top left, rgba(76, 106, 173, 0.18), transparent 36rem),
        linear-gradient(135deg, #f8f9fc 0%, var(--wp-bg) 48%, #e9edf7 100%);
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(46, 63, 124, 0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(46, 63, 124, 0.035) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent 70%);
    }
    #app {
      position: relative;
      max-width: 1120px !important;
    }
    .os-premium-shell { padding-top: 0.25rem; }
    .os-hero,
    .card,
    #os_flat_popover,
    #os_flat_ev_popover {
      background: rgba(255, 255, 255, 0.94) !important;
      border: 2px solid var(--wp-border) !important;
      border-radius: var(--wp-radius) !important;
      box-shadow: var(--wp-shadow) !important;
      backdrop-filter: saturate(1.08) blur(10px);
    }
    .os-hero {
      padding: 1rem 1.15rem;
      margin-bottom: 1rem;
      overflow: hidden;
      position: relative;
    }
    .os-hero::after {
      content: "";
      position: absolute;
      right: -4rem;
      top: -5rem;
      width: 14rem;
      height: 14rem;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(76,106,173,0.2), rgba(46,63,124,0.05));
      pointer-events: none;
    }
    .os-hero > * { position: relative; z-index: 1; }
    .os-brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 800;
      background: linear-gradient(135deg, var(--wp-btn-p1), var(--wp-btn-p3));
      box-shadow: 0 8px 20px rgba(46, 63, 124, 0.25);
      flex: 0 0 auto;
    }
    .os-kicker {
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--wp-accent);
      margin-bottom: 0.15rem;
    }
    .os-os-head .os-title,
    .os-login-title {
      font-size: 1.35rem;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.025em;
      color: var(--wp-text);
    }
    .os-os-head .os-sub,
    .os-login-sub,
    .text-muted { color: var(--wp-text-muted) !important; }
    .nav-tabs {
      gap: 0.35rem;
      border-bottom: 0;
      margin-bottom: 1rem !important;
      align-items: center;
    }
    .nav-tabs .nav-link {
      border: 2px solid transparent;
      border-radius: 999px;
      color: var(--wp-text-muted);
      font-weight: 800;
      padding: 0.48rem 0.85rem;
      transition: transform 0.12s ease, background-color 0.12s ease, color 0.12s ease;
    }
    .nav-tabs .nav-link:hover {
      color: var(--wp-accent);
      background: var(--wp-accent-soft);
      transform: translateY(-1px);
    }
    .nav-tabs .nav-link.active {
      color: #fff !important;
      background: linear-gradient(180deg, var(--wp-btn-p1), var(--wp-btn-p3));
      border-color: var(--wp-btn-p-border);
      box-shadow: 0 8px 18px rgba(46, 63, 124, 0.25);
    }
    .card { overflow: hidden; }
    .card-body { padding: 1.15rem; }
    h4, h5, h6 { font-weight: 800; letter-spacing: -0.015em; color: var(--wp-text); }
    label { font-weight: 700; color: var(--wp-text); }
    .form-control,
    .custom-select,
    select.form-control {
      background: var(--wp-input-bg) !important;
      border: 2px solid var(--wp-border) !important;
      border-radius: var(--wp-radius-sm) !important;
      color: var(--wp-text) !important;
      box-shadow: none !important;
    }
    .form-control:focus,
    select.form-control:focus {
      border-color: rgba(46, 63, 124, 0.55) !important;
      box-shadow: 0 0 0 0.18rem rgba(46, 63, 124, 0.14) !important;
    }
    .btn {
      border-radius: 999px !important;
      font-weight: 800 !important;
      border-width: 2px !important;
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease !important;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary,
    .btn-success {
      background: linear-gradient(180deg, var(--wp-btn-p1) 0%, var(--wp-btn-p2) 55%, var(--wp-btn-p3) 100%) !important;
      border-color: var(--wp-btn-p-border) !important;
      color: #fff !important;
      box-shadow: var(--wp-btn-p-shadow) !important;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.12);
    }
    .btn-outline-primary,
    .btn-outline-secondary,
    .btn-default {
      background: #fff !important;
      border-color: var(--wp-border) !important;
      color: var(--wp-accent) !important;
    }
    .btn-link { color: var(--wp-accent) !important; font-weight: 800 !important; }
    .table-responsive,
    .border.rounded.bg-white,
    .os-acc-scroll {
      background: var(--wp-surface) !important;
      border: 2px solid var(--wp-border) !important;
      border-radius: var(--wp-radius) !important;
      box-shadow: var(--wp-shadow);
      overflow: auto;
    }
    .table { color: var(--wp-text); margin-bottom: 0; }
    .table thead th,
    .thead-light th {
      background: linear-gradient(180deg, var(--wp-surface-2), var(--wp-surface)) !important;
      color: var(--wp-text) !important;
      border-color: var(--wp-border) !important;
      font-weight: 800;
      white-space: nowrap;
    }
    .table td,
    .table th { border-color: var(--wp-border) !important; vertical-align: middle; }
    .table-hover tbody tr:hover { background: var(--wp-accent-soft) !important; }
    .ev-row { border-bottom: 1px solid var(--wp-border); padding: 0.7rem 0; }
    .ev-prev { max-width: 120px; max-height: 68px; object-fit: cover; border-radius: var(--wp-radius-sm); }
    .os-flat-table tbody tr.os-flat-main { cursor: pointer; }
    .os-flat-table tbody tr.os-flat-main.os-flat-sel { background: var(--wp-accent-soft) !important; }
    .os-flat-table tr.os-flat-detail td { background: var(--wp-surface-2); border-top: 0; padding-top: 0.35rem; padding-bottom: 0.75rem; }
    .os-fio-line { font-size: 0.9rem; padding: 0.15rem 0; border-bottom: 1px solid var(--wp-border); }
    .os-fio-line:last-child { border-bottom: 0; }
    .os-chev { width: 2rem; text-align: center; user-select: none; }
    .os-flat-num { color: var(--wp-accent); font-weight: 800; }
    .alert-light {
      background: var(--wp-accent-soft) !important;
      border: 2px solid rgba(46, 63, 124, 0.12) !important;
      color: var(--wp-text) !important;
      border-radius: var(--wp-radius-sm) !important;
    }
    .bg-white { background-color: var(--wp-surface) !important; }
    .bg-light { background-color: var(--wp-surface-2) !important; }
    #os_event_video_modal .modal-body video { background: #000; }
    #os_event_video_modal { z-index: 1080 !important; }
    body.modal-open .modal-backdrop { z-index: 1075 !important; }
    #os_flat_popover { position: fixed; z-index: 1060; width: min(600px, calc(100vw - 16px)); max-height: min(90vh, 720px); overflow: hidden; display: none; }
    #os_flat_popover .os-work-pop-body { max-height: min(calc(90vh - 52px), 640px); overflow-y: auto; }
    #os_flat_ev_popover { position: fixed; z-index: 1070; width: min(540px, calc(100vw - 16px)); max-height: min(90vh, 640px); overflow: hidden; display: none; }
    #os_flat_ev_popover .os-flat-ev-body { max-height: min(calc(90vh - 52px), 560px); overflow-y: auto; }
    #os_flat_popover .border-bottom,
    #os_flat_ev_popover .border-bottom {
      border-bottom: 2px solid var(--wp-border) !important;
      background: linear-gradient(180deg, var(--wp-surface-2), var(--wp-surface)) !important;
    }
    .os-acc-scroll { max-height: 70vh; }
    .os-acc-matrix thead th { position: sticky; top: 0; z-index: 2; background: var(--wp-surface-2) !important; box-shadow: 0 1px 0 var(--wp-border); }
    .os-acc-matrix .os-acc-flatname { position: sticky; left: 0; z-index: 1; border-right: 1px solid var(--wp-border); }
    .os-acc-matrix .os-acc-corner { position: sticky; left: 0; top: 0; z-index: 3; background: var(--wp-surface-2) !important; box-shadow: 1px 1px 0 var(--wp-border); }
    .os-acc-colhead { max-width: 6.5rem; min-width: 4rem; }
    .os-acc-head-wrap { display: block; max-height: 7rem; overflow: hidden; word-break: break-word; line-height: 1.15; font-weight: 800; }
    @media (max-width: 575.98px) {
      #app { padding-left: 0.75rem !important; padding-right: 0.75rem !important; }
      .os-hero { padding: 0.9rem; }
      .nav-tabs .nav-link { padding: 0.42rem 0.68rem; }
    }
  </style>
</head>
<body>
  <div id="app" class="container py-3" style="max-width:900px"></div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
(function () {
  /**
   * База REST: в конфиге обычно frontend = …/frontend, api = …/api.
   * Страница ЛК лежит под /frontend/house-senior/ или /house-senior/ — запросы должны идти на /api, а не на /frontend.
   */
  function apiRoot() {
    try {
      var href = window.location.href;
      var path = window.location.pathname || "";
      if (path.indexOf("/frontend/") !== -1) {
        return String(new URL("../../api", href)).replace(/\/+$/, "");
      }
      if (path.indexOf("/house-senior/") !== -1) {
        return String(new URL("../api", href)).replace(/\/+$/, "");
      }
    } catch (e) {}
    var o = window.location.origin;
    return o + "/api";
  }

  function qs(name) {
    var m = new RegExp("[?&]" + name + "=([^&]*)").exec(window.location.search);
    return m ? decodeURIComponent(m[1].replace(/\+/g, " ")) : "";
  }
  var slug = (qs("t") || qs("slug") || "").replace(/^\s+|\s+$/g, "").replace(/\s+/g, "").toLowerCase();
  var token = sessionStorage.getItem("os_token") || "";
  var me = null;

  var OS_EVENTS_PAGE_LIMIT = 50;
  var osEventsOffset = 0;

  /** API отдаёт плоский JSON; иногда обёртка { "200": { … } } или ошибка { "403": { "error": "…" } }. */
  function unwrap200(j) {
    if (!j || typeof j !== "object") return null;
    if (Object.prototype.hasOwnProperty.call(j, "200") && j["200"] != null && typeof j["200"] === "object") {
      return j["200"];
    }
    return j;
  }

  function firstErrorPayload(j) {
    if (!j || typeof j !== "object") return "";
    if (typeof j.error === "string") return j.error;
    for (var k in j) {
      if (!Object.prototype.hasOwnProperty.call(j, k)) continue;
      var v = j[k];
      if (v && typeof v === "object" && typeof v.error === "string") return v.error;
    }
    return "";
  }

  function readSeniorAuthToken(u) {
    if (!u || typeof u !== "object") return "";
    var a = u.objectSeniorAuth;
    if (a && typeof a === "object" && a.token) return String(a.token);
    if (u.token) return String(u.token);
    return "";
  }

  function apiFetch(method, path, body) {
    var url = apiRoot() + path;
    var opts = {
      method: method,
      cache: method === "GET" ? "no-store" : "default",
      headers: {
        "Accept-Language": "ru",
        "Accept": "application/json, text/plain, */*",
      },
    };
    if (token) {
      opts.headers["Authorization"] = "Bearer " + token;
    }
    if (body !== undefined) {
      opts.headers["Content-Type"] = "application/json; charset=UTF-8";
      opts.body = JSON.stringify(body);
    }
    return fetch(url, opts).then(function (r) {
      return r.text().then(function (t) {
        var j = {};
        if (t) {
          try {
            j = JSON.parse(t);
          } catch (e) {
            j = { _nonJson: true, _snippet: String(t).substring(0, 240) };
          }
        }
        j._httpOk = r.ok;
        j._httpStatus = r.status;
        return j;
      });
    });
  }

  function renderLogin() {
    $("#os_flat_popover,#os_flat_ev_popover").remove();
    osFlatPopoverFid = 0;
    $("#app").html(
      "<div class=\"os-premium-shell\">" +
      "<div class=\"os-hero d-flex align-items-center mb-3\">" +
      "<div class=\"os-brand-mark mr-3\">ЛК</div>" +
      "<div><div class=\"os-kicker\">CityHome</div><div class=\"os-login-title\">ЛК Старших</div>" +
      "<div class=\"os-login-sub\">Личный кабинет в стиле основной платформы</div></div></div>" +
      "<div class=\"row justify-content-center\"><div class=\"col-12 col-md-9 col-lg-7\">" +
      "<div class=\"card card-body\">" +
      "<h4 class=\"mb-1\">Вход</h4><p class=\"text-muted small mb-3\">Введите код кабинета, логин и пароль.</p>" +
      "<div class=\"form-group\"><label>Код ссылки на кабинет (из адресной строки после <code>?t=</code>)</label>" +
      "<input type=\"text\" class=\"form-control\" id=\"os_slug\" value=\"" + $("<div>").text(slug).html() + "\" /></div>" +
      "<div class=\"form-group\"><label>Имя учётной записи (логин)</label><input type=\"text\" class=\"form-control\" id=\"os_login\" autocomplete=\"username\" /></div>" +
      "<div class=\"form-group\"><label>Пароль</label><input type=\"password\" class=\"form-control\" id=\"os_pass\" autocomplete=\"current-password\" /></div>" +
      "<button type=\"button\" class=\"btn btn-primary btn-lg px-4\" id=\"os_btn\">Войти</button>" +
      "</div></div></div></div>"
    );
    $("#os_btn").on("click", function () {
      var s = $.trim($("#os_slug").val()).replace(/\s+/g, "").toLowerCase();
      var l = $.trim($("#os_login").val());
      var p = $("#os_pass").val();
      apiFetch("POST", "/objectSeniorAuth/login", { slug: s, login: l, password: p }).then(function (j) {
        if (!j._httpOk) {
          var err = firstErrorPayload(j) || firstErrorPayload(unwrap200(j)) || j._snippet;
          var msg = "Ошибка входа";
          if (err === "accessDenied") {
            msg += ": неверный код ссылки (slug), логин или пароль. Убедитесь, что кабинет создан в админке, slug скопирован полностью из ссылки «Ссылка в ЛК».";
          } else if (err) {
            msg += ": " + err;
          }
          msg += " (HTTP " + j._httpStatus + ")";
          alert(msg);
          return;
        }
        var u = unwrap200(j);
        var tok = readSeniorAuthToken(u);
        if (tok) {
          token = tok;
          sessionStorage.setItem("os_token", token);
          slug = s;
          boot();
        } else {
          alert("Ошибка входа: в ответе нет токена. Проверьте slug, логин и пароль.");
        }
      }).catch(function () { alert("Сеть: не удалось связаться с " + apiRoot()); });
    });
  }

  function boot() {
    apiFetch("GET", "/objectSenior/whoAmI", undefined).then(function (j) {
      if (!j._httpOk) {
        sessionStorage.removeItem("os_token");
        token = "";
        renderLogin();
        return;
      }
      var u = unwrap200(j);
      if (!u || !u.objectSenior) {
        sessionStorage.removeItem("os_token");
        token = "";
        renderLogin();
        return;
      }
      me = u.objectSenior;
      if (me.login == null) me.login = "";
      if (typeof me.can_view_events === "string") me.can_view_events = parseInt(me.can_view_events, 10) || 0;
      if (typeof me.can_manage_subscribers === "string") me.can_manage_subscribers = parseInt(me.can_manage_subscribers, 10) || 0;
      if (typeof me.can_manage_entrance_access === "string") me.can_manage_entrance_access = parseInt(me.can_manage_entrance_access, 10) || 0;
      renderApp();
    }).catch(function () {
      sessionStorage.removeItem("os_token");
      token = "";
      renderLogin();
    });
  }

  function renderApp() {
    var activeEv = !!me.can_view_events;
    var activeSu = !activeEv && !!me.can_manage_subscribers;
    var activeAc = !activeEv && !activeSu && !!me.can_manage_entrance_access;
    var activePw = !activeEv && !activeSu && !activeAc;
    function tabCls(on) {
      return on ? "nav-link active" : "nav-link";
    }
    var tabs = "<ul class=\"nav nav-tabs mb-3\">" +
      (me.can_view_events ? ("<li class=\"nav-item\"><a class=\"" + tabCls(activeEv) + "\" data-t=\"ev\" href=\"#\">События</a></li>") : "") +
      (me.can_manage_subscribers ? ("<li class=\"nav-item\"><a class=\"" + tabCls(activeSu) + "\" data-t=\"su\" href=\"#\">Квартиры</a></li>") : "") +
      (me.can_manage_subscribers ? ("<li class=\"nav-item\"><a class=\"nav-link\" data-t=\"br\" href=\"#\">Оповещение</a></li>") : "") +
      (me.can_manage_entrance_access ? ("<li class=\"nav-item\"><a class=\"" + tabCls(activeAc) + "\" data-t=\"ac\" href=\"#\">Доступы</a></li>") : "") +
      ("<li class=\"nav-item\"><a class=\"" + tabCls(activePw) + "\" data-t=\"pw\" href=\"#\">Пароль</a></li>") +
      "<li class=\"nav-item ml-auto\"><a class=\"nav-link text-danger\" id=\"os_logout\" href=\"#\">Выход</a></li></ul>";
    var headLine = "";
    if (me.title && String(me.title).trim()) {
      headLine = "<div class=\"os-os-head mb-2\"><div class=\"os-title\">" + $("<div>").text(String(me.title).trim()).html() + "</div>" +
        "<div class=\"os-sub\">" + $("<div>").text(me.houseFull || "").html();
      if (me.login) {
        headLine += " · вход: <span class=\"text-monospace\">" + $("<div>").text(me.login).html() + "</span>";
      }
      headLine += "</div></div>";
    } else {
      headLine = "<div class=\"os-os-head mb-2\"><div class=\"os-title\">" + $("<div>").text(me.houseFull || "ЛК Старших").html() + "</div>";
      if (me.login) {
        headLine += "<div class=\"os-sub\">вход: <span class=\"text-monospace\">" + $("<div>").text(me.login).html() + "</span></div>";
      }
      headLine += "</div>";
    }
    $("#app").html(
      "<div class=\"os-premium-shell\">" +
      "<div class=\"os-hero d-flex align-items-center justify-content-between flex-wrap\">" +
      "<div class=\"d-flex align-items-center mr-3 mb-2 mb-sm-0\"><div class=\"os-brand-mark mr-3\">ЛК</div>" +
      headLine + "</div>" +
      "<div class=\"text-muted small font-weight-bold\">CityHome · премиум-кабинет</div>" +
      "</div>" + tabs + "<div id=\"os_body\"></div></div>"
    );
    $("#os_logout").on("click", function () {
      hideOsFlatPopover();
      hideOsFlatEventsPopover();
      $("#os_flat_popover,#os_flat_ev_popover").remove();
      osFlatPopoverFid = 0;
      sessionStorage.removeItem("os_token");
      token = "";
      me = null;
      renderLogin();
    });
    $(".nav-link[data-t]").on("click", function (e) {
      e.preventDefault();
      $(".nav-link[data-t]").removeClass("active");
      $(this).addClass("active");
      var t = $(this).data("t");
      if (t === "ev") { loadEvents(); }
      else if (t === "su") { loadSubs(); }
      else if (t === "br") { loadBroadcast(); }
      else if (t === "ac") { loadAccesses(); }
      else if (t === "pw") { loadPw(); }
    });
    if (me.can_view_events) { loadEvents(); }
    else if (me.can_manage_subscribers) { loadSubs(); }
    else if (me.can_manage_entrance_access) { loadAccesses(); }
    else { loadPw(); }
  }

  function ensureOsEventVideoModal() {
    if ($("#os_event_video_modal").length) return;
    $("body").append(
      "<div class=\"modal fade\" id=\"os_event_video_modal\" tabindex=\"-1\" role=\"dialog\" aria-hidden=\"true\">" +
      "<div class=\"modal-dialog modal-lg modal-dialog-centered\" role=\"document\">" +
      "<div class=\"modal-content\">" +
      "<div class=\"modal-header py-2\"><h5 class=\"modal-title\">Видео события</h5>" +
      "<button type=\"button\" class=\"close\" data-dismiss=\"modal\" aria-label=\"Закрыть\"><span aria-hidden=\"true\">&times;</span></button></div>" +

  function flatById(fid) {
    var n = Number(fid);
    for (var i = 0; i < flatsCache.length; i++) {

      }

  function sortFlatsCopy(arr) {
    return arr.slice().sort(function (a, b) {
      var sa = String(a.flat != null ? a.flat : a.flatId);
      var sb = String(b.flat != null ? b.flat : b.flatId);
      var na = parseInt(String(sa).replace(/^[^\d]*/, "").split(/\D/)[0], 10);
      var nb = parseInt(String(sb).replace(/^[^\d]*/, "").split(/\D/)[0], 10);
      if (!isNaN(na) && !isNaN(nb) && na !== nb) {
        return na - nb;
      }
      return sa.localeCompare(sb, "ru", { sensitivity: "base" });
    });
  }

  function subsForFlat(allSubs, flatId) {
    var nf = Number(flatId);
    var out = [];
    (allSubs || []).forEach(function (sub) {
      (sub.flats || []).forEach(function (fl) {
        if (Number(fl.flatId) === nf) {
          out.push(sub);
        }
      });
    });
    return out;
  }

  function uniqSubs(list) {
    var seen = {};
    var r = [];
    list.forEach(function (s) {
      var id = Number(s.subscriberId);
      if (!seen[id]) {
        seen[id] = true;
        r.push(s);
      }
    });
    return r;
  }

    if (!fl) return false;
    return Number(fl.role) === 0;

  function positionOsFixedPopover($el, clientX, clientY) {
    $el.css({ left: 0, top: 0, visibility: "hidden", display: "block" });
    var w = $el.outerWidth();
    var h = $el.outerHeight();
    var pad = 8;
    var ww = $(window).width();
    var wh = $(window).height();
    var sx = typeof clientX === "number" ? clientX : ww / 2;
    var sy = typeof clientY === "number" ? clientY : wh / 2;
    var x = sx + pad;
    var y = sy + pad;
    if (x + w > ww - pad) {
      x = Math.max(pad, ww - w - pad);
    }
    if (y + h > wh - pad) {
      y = Math.max(pad, wh - h - pad);
    }
    $el.css({ left: x, top: y, visibility: "visible", position: "fixed" });
  }

      "<h6 class=\"mb-2\">Оповещение жильцам (мобильное приложение)</h6>" +
      "<p class=\"small text-muted mb-3\">Сообщение уходит в приложение у абонентов дома (с учётом ограничения кабинета по квартирам, если задано).</p>" +
      "<div class=\"card card-body mb-3\" style=\"max-width:640px\">" +
      "<div class=\"form-group mb-2\"><label for=\"os_bc_title\">Заголовок</label>" +
      "<input type=\"text\" class=\"form-control form-control-sm\" id=\"os_bc_title\" maxlength=\"512\"/></div>" +
      "<div class=\"form-group mb-2\"><label for=\"os_bc_body\">Текст</label>" +
      "<textarea class=\"form-control form-control-sm\" id=\"os_bc_body\" rows=\"6\" maxlength=\"32000\"></textarea></div>" +
      "<div class=\"form-group mb-3\"><label for=\"os_bc_action\">Действие</label>" +
      "<select class=\"form-control form-control-sm\" id=\"os_bc_action\">" +
      "<option value=\"inbox\">Входящие</option><option value=\"money\">Оплата</option></select></div>" +
      "<button type=\"button\" class=\"btn btn-primary btn-sm\" id=\"os_bc_send\">Отправить</button>" +
      "<p class=\"small text-muted mt-2 mb-0\" id=\"os_bc_hint\"></p></div>"
    );
    $("#os_bc_send").on("click", function () {
      var title = $.trim($("#os_bc_title").val());
      var body = $.trim($("#os_bc_body").val());
      var action = String($("#os_bc_action").val() || "inbox");
      if (!title || !body) { alert("Укажите заголовок и текст."); return; }
      $("#os_bc_send").prop("disabled", true);
      $("#os_bc_hint").text("Отправка…");
      apiFetch("POST", "/objectSenior/broadcast", { title: title, body: body, action: action }).then(function (rj) {
        $("#os_bc_send").prop("disabled", false);
        if (!rj._httpOk) {
          var er = firstErrorPayload(rj) || firstErrorPayload(unwrap200(rj));
          $("#os_bc_hint").text("");
          alert("Не удалось: " + (er || rj._httpStatus));
          return;
        }
        var u = unwrap200(rj);
        var b = u && u.broadcast ? u.broadcast : null;
        if (!b) { $("#os_bc_hint").text(""); alert("Пустой ответ."); return; }
        $("#os_bc_hint").text("Абонентов: " + (b.recipients != null ? b.recipients : "—") +
          ", записано: " + (b.deliveredSubscribers != null ? b.deliveredSubscribers : "—") +
          ", сбой: " + (b.failedSubscribers != null ? b.failedSubscribers : "—"));
      }).catch(function () {
        $("#os_bc_send").prop("disabled", false);
        $("#os_bc_hint").text("");
        alert("Ошибка сети");
      });
    });
  }

  function loadSubs() {
    hideOsFlatEventsPopover();
    if ($("#os_event_video_modal").length) { $("#os_event_video_modal").modal("hide"); }
    hideOsFlatPopover();
    $("#os_flat_popover").remove();
    $("#os_body").html("<p>Загрузка…</p>");
    $(document).off("keydown.osfp click.osfp");
    Promise.all([
      apiFetch("GET", "/objectSenior/flats", undefined),
      apiFetch("GET", "/objectSenior/subscribers", undefined),
    ]).then(function (pair) {
      var fj = pair[0];
      var sj0 = pair[1];
      if (!fj._httpOk) {
        var er = firstErrorPayload(fj) || firstErrorPayload(unwrap200(fj));
        $("#os_body").html("<p class=\"text-danger\">Квартиры: " + (er || ("HTTP " + fj._httpStatus)) + "</p>");
        return;
      }
      if (!sj0._httpOk) {
        var er2 = firstErrorPayload(sj0) || firstErrorPayload(unwrap200(sj0));
        $("#os_body").html("<p class=\"text-danger\">Абоненты: " + (er2 || ("HTTP " + sj0._httpStatus)) + "</p>");
        return;
      }
      var fu = unwrap200(fj);
      var su = unwrap200(sj0);
      flatsCache = (fu && fu.flats) ? fu.flats : [];
      houseEntrancesCache = (fu && fu.houseEntrances) ? fu.houseEntrances : [];
      houseSubscribersCache = (su && su.subscribers) ? su.subscribers : [];

      var entHintHtml = "";
      if (me.can_manage_entrance_access) {
        entHintHtml =
          "<div class=\"small text-muted mb-2\"><strong>Входы квартиры</strong> — отметьте подъезды/входы дома, через которые доступна эта квартира (одинаково для всех жильцов). Должен быть выбран хотя бы один.</div>" +
          "<div id=\"os_ent_wrap\" class=\"mb-2 small border rounded p-2 bg-white\"></div>" +
          "<button type=\"button\" class=\"btn btn-sm btn-primary mb-2\" id=\"os_flat_ent_save\">Сохранить входы</button>";
      } else {
        entHintHtml =
          "<div class=\"small text-muted mb-2\">Входы, привязанные к квартире (только просмотр).</div>" +
          "<div id=\"os_ent_wrap\" class=\"mb-2 small border rounded p-2 bg-light\"></div>";
      }

      var popInner =
        "<div class=\"d-flex align-items-center border-bottom px-2 py-1 bg-white\">" +
        "<strong id=\"os-work-pop-title\" class=\"flex-grow-1 small\">Квартира</strong>" +
        "<button type=\"button\" class=\"close ml-2\" id=\"os_flat_popover_x\" aria-label=\"Закрыть\"><span aria-hidden=\"true\">&times;</span></button></div>" +
        "<div class=\"os-work-pop-body p-2 bg-white\">" +
        "<div id=\"os_sel_banner\" class=\"alert alert-light border small mb-2 py-1\">Откройте квартиру строкой в таблице</div>" +
        "<input type=\"hidden\" id=\"os_flat\" value=\"\"/>" +
        entHintHtml +
        "<div id=\"os_sublist\" class=\"mb-2\"></div>" +
        "<h6 class=\"small font-weight-bold mb-1\">Добавить жильца</h6>" +
        "<input class=\"form-control form-control-sm mb-1\" id=\"os_mob\" placeholder=\"Телефон\"/>" +
        "<input class=\"form-control form-control-sm mb-1\" id=\"os_sn\" placeholder=\"Имя\"/>" +
        "<input class=\"form-control form-control-sm mb-1\" id=\"os_sp\" placeholder=\"Отчество\"/>" +
        "<input class=\"form-control form-control-sm mb-1\" id=\"os_sl\" placeholder=\"Фамилия\"/>" +
        "<div id=\"os_flat_cars_block\" class=\"mb-2\" style=\"display:none\">" +
        "<label class=\"small font-weight-bold d-block\">Госномера (по одному в строке)</label>" +
        "<textarea class=\"form-control form-control-sm\" id=\"os_flat_cars_ta\" rows=\"4\" placeholder=\"А777AA77\"></textarea>" +
        "<button type=\"button\" class=\"btn btn-sm btn-primary mt-1\" id=\"os_flat_cars_save\">Сохранить номера</button></div>" +
        "<button class=\"btn btn-success btn-sm\" id=\"os_addsub\">Добавить</button>" +
        "</div>";

      $("body").append("<div id=\"os_flat_popover\" class=\"shadow-lg border-0\">" + popInner + "</div>");
      ensureOsFlatEvPopover();

      $("#os_flat_popover_x").on("click", function () {
        hideOsFlatPopover();
      });

      var sorted = sortFlatsCopy(flatsCache);
      var tbody = "";
      var showEvCol = !!me.can_view_events;
      sorted.forEach(function (f) {
        var fid = Number(f.flatId);
        var subList = uniqSubs(subsForFlat(houseSubscribersCache, fid));
        var hasSubs = subList.length > 0;
        var ownerPhones = subList.filter(function (s) { return isFlatOwner(s, fid); }).map(function (s) {
          return String(s.mobile || "").trim();
        }).filter(Boolean);
        var phoneHtml = ownerPhones.length
          ? $("<div>").text(ownerPhones.join(", ")).html()
          : "<span class=\"text-muted\">нет владельца</span>";
        var flatLabel = String(f.flat != null && f.flat !== "" ? f.flat : fid);
        var flatNumClass = hasSubs ? "os-flat-num" : "";
        var fioShort = "";
        if (!subList.length) {
          fioShort = "<span class=\"text-muted small\">—</span>";
        } else {
          var parts = subList.slice(0, 2).map(function (s) {
            return $("<div>").text(String(s.subscriberFull || s.mobile || "—").trim()).html();
          });
          fioShort = "<span class=\"small\">" + parts.join(", ") + "</span>";
          if (subList.length > 2) {
            fioShort += " <span class=\"text-muted small\">+" + (subList.length - 2) + "</span>";
          }
        }
        tbody += "<tr class=\"os-flat-main\" data-fid=\"" + fid + "\">" +
          "<td class=\"os-chev text-muted\">▸</td>" +
          "<td><strong" + (flatNumClass ? " class=\"" + flatNumClass + "\"" : "") + ">кв. " + $("<div>").text(flatLabel).html() + "</strong></td>" +
          "<td>" + phoneHtml + "</td>" +
          "<td>" + fioShort + "</td>";
        if (showEvCol) {
          tbody += "<td class=\"text-center\"><button type=\"button\" class=\"btn btn-sm btn-outline-secondary os-flat-ev\">События</button></td>";
        }
        tbody += "</tr>";
      });

      var thRow = "<tr><th class=\"os-chev\"></th><th>Квартира</th><th>Телефон владельца</th><th>Жильцы</th>";
      if (showEvCol) {
        thRow += "<th class=\"text-center\" style=\"width:6.5rem\">События</th>";
      }
      thRow += "</tr>";

      $("#os_body").html(
        "<h6 class=\"mb-2\">Квартиры</h6>" +
        "<p class=\"small text-muted mb-2\">Нажмите строку квартиры — откроется панель: входы квартиры (общие для всех жильцов), список жильцов, госномера. " +
        (showEvCol ? "По кнопке «События» — журнал открытий по выбранной квартире." : "") + "</p>" +
        "<div class=\"table-responsive border rounded bg-white\">" +
        "<table class=\"table table-sm table-hover os-flat-table mb-0\">" +
        "<thead class=\"thead-light\">" + thRow + "</thead>" +
        "<tbody id=\"os_flat_tbody\">" + tbody + "</tbody></table></div>"
      );

      $(document).on("keydown.osfp", function (e) {
        if (e.key === "Escape") {
          hideOsFlatPopover();
          hideOsFlatEventsPopover();
        }
      });
      $(document).on("click.osfp", function (e) {
        if ($(e.target).closest("#os_flat_popover, #os_flat_ev_popover, .os-flat-table").length) {
          return;
        }
        hideOsFlatPopover();
        hideOsFlatEventsPopover();
      });

      var selectedFlatId = 0;

      function setSelectedFlat(fid) {
        selectedFlatId = Number(fid);
        $("#os_flat").val(selectedFlatId || "");
        var fl = flatById(selectedFlatId);
        var label = fl ? ("кв. " + (fl.flat || selectedFlatId)) : String(selectedFlatId);
        $("#os_sel_banner").html("Выбрана <strong>" + $("<div>").text(label).html() + "</strong>. Владелец в квартире один: при назначении другого прежний снимается автоматически.");
        updEnt();
        loadFlatSubscribers(selectedFlatId);
        renderFlatCarsPanel(selectedFlatId);
      }

      function openWorkPanelAt(fid, clientX, clientY) {
        hideOsFlatEventsPopover();
        var n = Number(fid);
        if (osFlatPopoverFid === n && $("#os_flat_popover").is(":visible")) {
          hideOsFlatPopover();
          return;
        }
        osFlatPopoverFid = n;
        $("#os_flat_popover").show();
        var fl = flatById(n);
        var flab = fl && fl.flat != null && String(fl.flat).trim() !== "" ? String(fl.flat).trim() : String(n);
        $("#os-work-pop-title").text("Кв. " + flab);
        $("#os_flat_tbody tr.os-flat-main").removeClass("os-flat-sel").find(".os-chev").text("▸");
        var $tr = $("#os_flat_tbody tr.os-flat-main[data-fid=\"" + n + "\"]");
        $tr.addClass("os-flat-sel").find(".os-chev").text("▾");
        setSelectedFlat(n);
        positionOsFlatPopover(clientX, clientY);
      }

      function updEnt() {
        var fid = Number(selectedFlatId);
        if (!fid) {
          $("#os_ent_wrap").html("<span class=\"text-muted\">Сначала откройте квартиру строкой в таблице</span>");
          return;
        }
        var flat = flatById(fid);
        var entrances = houseEntrancesCache || [];
        if (me.can_manage_entrance_access) {
          if (!$("#os_flat_ent_save").length) {
            return;
          }
          if (!entrances.length) {
            $("#os_ent_wrap").html("<span class=\"text-muted\">В карточке дома нет входов. Добавьте их в админке.</span>");
            $("#os_flat_ent_save").prop("disabled", true);
            return;
          }
          $("#os_flat_ent_save").prop("disabled", false);
          var bound = {};
          (flat && flat.entrances ? flat.entrances : []).forEach(function (x) {
            var ei = Number(x.entranceId || 0);
            if (ei > 0) {
              bound[ei] = true;
            }
          });
          var h = "";
          entrances.forEach(function (ee) {
            var eid = Number(ee.entranceId || 0);
            if (!eid) {
              return;
            }
            var lbl = osEntranceChoiceLabel(ee);
            var on = bound[eid] ? " checked" : "";
            h += "<label class=\"d-block mb-1\"><input type=\"checkbox\" class=\"os_flat_ent_chk\" data-eid=\"" + eid + "\"" + on + "/> " + $("<div>").text(lbl).html() + "</label>";
          });
          $("#os_ent_wrap").html(h || "<span class=\"text-muted\">Нет входов</span>");
          return;
        }
        var parts = [];
        (flat && flat.entrances ? flat.entrances : []).forEach(function (e) {
          var eid = Number(e.entranceId || 0);
          if (!eid) {
            return;
          }
          var meta = null;
          for (var ii = 0; ii < entrances.length; ii++) {
            if (Number(entrances[ii].entranceId) === eid) {
              meta = entrances[ii];
              break;
            }
          }
          parts.push(meta ? osEntranceChoiceLabel(meta) : ("вход " + eid));
        });
        $("#os_ent_wrap").html(
          parts.length
            ? ("<span class=\"text-muted\">Входы:</span> " + $("<div>").text(parts.join("; ")).html())
            : "<span class=\"text-muted\">К квартире не привязаны входы</span>"
        );
      }

      function loadFlatSubscribers(fid) {
        if (!fid) {
          $("#os_sublist").html("");
          return;
        }
        $("#os_sublist").html("<p class=\"small text-muted mb-0\">Загрузка…</p>");
        apiFetch("GET", "/objectSenior/subscribers?flatId=" + fid, undefined).then(function (sj) {
          if (!sj._httpOk) {
            $("#os_sublist").html("<p class=\"text-danger small\">Ошибка загрузки</p>");
            return;
          }
          var su = unwrap200(sj);
          var list = su && su.subscribers ? su.subscribers : [];
          drawSubTable(Number(fid), list);
        });
      }

      function drawSubTable(fid, list) {
        var t = "<table class=\"table table-sm\"><thead><tr><th>Телефон</th><th>ФИО</th><th class=\"text-center\">Владелец</th><th></th></tr></thead><tbody>";
        list.forEach(function (s) {
          var sid = Number(s.subscriberId);
          var own = !!s.flatOwner;
          t += "<tr><td class=\"text-monospace\">" + $("<div>").text(s.mobile || "").html() + "</td><td>" + $("<div>").text(s.subscriberFull || "").html() + "</td>" +
            "<td class=\"text-center\"><label class=\"mb-0 small\"><input type=\"checkbox\" class=\"os_own\" data-fid=\"" + fid + "\" data-sid=\"" + sid + "\" " + (own ? "checked" : "") + "/> владелец</label></td>" +
            "<td><button class=\"btn btn-link btn-sm os_del\" data-sid=\"" + sid + "\" data-fid=\"" + fid + "\">Удалить</button></td></tr>";
        });
        t += "</tbody></table>";
        $("#os_sublist").html(list.length ? t : "<p class=\"text-muted mb-0\">Пусто</p>");

        $("#os_sublist").off("change", ".os_own").on("change", ".os_own", function () {
          var $cb = $(this);
          var want = $cb.prop("checked");
          var ff = Number($cb.data("fid"));
          var sid = Number($cb.data("sid"));
          apiFetch("PUT", "/objectSenior/subscriberOwner", { flatId: ff, subscriberId: sid, isOwner: want ? 1 : 0 }).then(function (rj) {
            if (!rj._httpOk) {
              $cb.prop("checked", !want);
              var er = firstErrorPayload(rj) || firstErrorPayload(unwrap200(rj));
              alert("Не удалось изменить владельца: " + (er || rj._httpStatus));
              return;
            }
            loadSubs();
          });
        });
        $("#os_sublist").off("click", ".os_del").on("click", ".os_del", function () {
          var sid = $(this).data("sid");
          var ff = $(this).data("fid");
          if (!confirm("Удалить жильца из квартиры?")) return;
          apiFetch("DELETE", "/objectSenior/subscriber", { flatId: ff, subscriberId: sid }).then(function (rj) {
            if (!rj._httpOk) {
              var er = firstErrorPayload(rj) || firstErrorPayload(unwrap200(rj));
              alert("Не удалось удалить: " + (er || rj._httpStatus));
              return;
            }
            loadSubs();
          });
        });

      }

      $("#os_flat_tbody").on("click", ".os-flat-ev", function (e) {
        e.stopPropagation();
        var fid = Number($(this).closest("tr").attr("data-fid"));
        openOsFlatEventsPopover(fid, e.clientX, e.clientY);
      });

      $("#os_flat_tbody").on("click", ".os-flat-main", function (e) {
        if ($(e.target).closest(".os-flat-ev").length) {
          return;
        }
        var fid = Number($(this).attr("data-fid"));
        openWorkPanelAt(fid, e.clientX, e.clientY);
      });

      if (me.can_manage_entrance_access) {
        $("#os_flat_ent_save").on("click", function () {
          var ff = Number(selectedFlatId);
          if (!ff) {
            alert("Сначала откройте квартиру в таблице");
            return;
          }
          var ids = [];
          $("#os_ent_wrap .os_flat_ent_chk:checked").each(function () {
            ids.push(Number($(this).data("eid")));
          });
          if (!ids.length) {
            alert("Выберите хотя бы один вход для квартиры.");
            return;
          }
          apiFetch("PUT", "/objectSenior/flatEntrances", { flatId: ff, entranceIds: ids }).then(function (rj) {
            if (!rj._httpOk) {
              var er = firstErrorPayload(rj) || firstErrorPayload(unwrap200(rj));
              alert("Не удалось сохранить входы: " + (er || rj._httpStatus));
              return;
            }
            apiFetch("GET", "/objectSenior/flats", undefined).then(function (fj2) {
              if (!fj2._httpOk) {
                loadSubs();
                return;
              }
              var fu2 = unwrap200(fj2);
              if (fu2 && fu2.flats) {
                flatsCache = fu2.flats;
              }
              if (fu2 && fu2.houseEntrances) {
                houseEntrancesCache = fu2.houseEntrances;
              }
              updEnt();
              alert("Входы квартиры сохранены");
            }).catch(function () {
              loadSubs();
            });
          });
        });
      }

      $("#os_flat_cars_save").on("click", function () {
        var fid = Number($("#os_flat").val());
        if (!fid) {
          alert("Сначала откройте квартиру в таблице");
          return;
        }
        var raw = $("#os_flat_cars_ta").val();
        apiFetch("PUT", "/objectSenior/flatCars", { flatId: fid, cars: raw != null ? String(raw) : "" }).then(function (rj) {
          if (!rj._httpOk) {
            var er = firstErrorPayload(rj) || firstErrorPayload(unwrap200(rj));
            alert("Не удалось сохранить номера: " + (er || rj._httpStatus));
            return;
          }
          var u = unwrap200(rj);
          var op = u && u.operationResult ? u.operationResult : null;
          var carsOut = op && op.cars != null ? op.cars : null;
          if (carsOut != null) {
            var fl = flatById(fid);
            if (fl) {
              fl.cars = carsOut;
            }
          }
          renderFlatCarsPanel(fid);
          alert("Госномера сохранены");
        });
      });

      $("#os_addsub").on("click", function () {
        var fid = Number($("#os_flat").val());
        if (!fid) {
          alert("Сначала откройте квартиру строкой в таблице");
          return;
        }
        var body = {
          flatId: fid,
          mobile: $.trim($("#os_mob").val()),
          subscriberName: $.trim($("#os_sn").val()),
          subscriberPatronymic: $.trim($("#os_sp").val()),
          subscriberLast: $.trim($("#os_sl").val()),
        };
        apiFetch("POST", "/objectSenior/subscriber", body).then(function (rj) {
          if (!rj._httpOk) {
            var er = firstErrorPayload(rj) || firstErrorPayload(unwrap200(rj));
            alert("Не удалось добавить: " + (er || rj._httpStatus));
            return;
          }
          loadSubs();
        });
      });
    }).catch(function () {
      $("#os_body").html("<p class=\"text-danger\">Ошибка сети</p>");
    });
  }

  function loadPw() {
    hideOsFlatPopover();
    hideOsFlatEventsPopover();
    if ($("#os_event_video_modal").length) { $("#os_event_video_modal").modal("hide"); }
    $("#os_body").html(
      "<div class=\"card card-body\" style=\"max-width:400px\">" +
      "<div class=\"form-group\"><label>Старый пароль</label><input type=\"password\" class=\"form-control\" id=\"os_o\"/></div>" +
      "<div class=\"form-group\"><label>Новый пароль</label><input type=\"password\" class=\"form-control\" id=\"os_n\"/></div>" +
      "<button class=\"btn btn-primary\" id=\"os_pwbtn\">Сменить</button></div>"
    );
    $("#os_pwbtn").on("click", function () {
      apiFetch("PUT", "/objectSeniorAuth/password", { oldPassword: $("#os_o").val(), newPassword: $("#os_n").val() }).then(function (j) {
        var pu = unwrap200(j);
        if (pu && pu.objectSeniorAuth && pu.objectSeniorAuth.ok) { alert("Пароль изменён. Войдите снова."); sessionStorage.removeItem("os_token"); token = ""; renderLogin(); }
        else { alert("Ошибка"); }
      });
    });
  }

  if (token) { boot(); }
  else { renderLogin(); }
})();
  </script>
</body>
</html>
