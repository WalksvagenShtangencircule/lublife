<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ключи квартиры</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 16px; background: #f4f6f8; color: #1a1a1a; }
        .card { max-width: 520px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: 12px; }
        h1 { font-size: 1.05rem; margin: 0 0 10px; font-weight: 600; }
        h2 { font-size: 0.95rem; margin: 0 0 8px; font-weight: 600; }
        select, textarea, input[type="text"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cfd6dd; font-size: 0.95rem; }
        label { display: block; font-size: 0.75rem; color: #555; margin-bottom: 4px; }
        button {
            padding: 10px 14px; border: none; border-radius: 8px; background: #1565c0; color: #fff; font-size: 0.9rem; cursor: pointer;
        }
        button.secondary { background: #546e7a; }
        button.linkish { background: transparent; color: #1565c0; padding: 4px 8px; font-size: 0.85rem; }
        .keys { list-style: none; padding: 0; margin: 0; }
        .keys li { padding: 10px 0; border-bottom: 1px solid #eee; font-size: 0.9rem; word-break: break-all; }
        .keys li:last-child { border-bottom: none; }
        .muted { color: #777; font-size: 0.82rem; }
        .err { color: #c62828; margin-top: 6px; font-size: 0.85rem; }
        .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        @media (max-width: 420px) { .row2 { grid-template-columns: 1fr; } }
        .rfid-line { font-weight: 600; }
        .cmt { margin-top: 4px; color: #444; }
        .edit-row { margin-top: 8px; display: none; }
        .edit-row.open { display: block; }
        .watch-row { margin-top: 8px; display: flex; align-items: center; gap: 8px; }
        .watch-row input[type="checkbox"] { width: 16px; height: 16px; }
        .watch-label { font-size: 0.82rem; color: #555; margin: 0; display: inline; }
        .code-watch { margin-top: 10px; padding: 10px; border: 1px solid #e6ebef; border-radius: 10px; background: #fafbfd; }
        .code-watch-title { margin: 0; font-size: 0.9rem; font-weight: 600; }
        .code-watch-value { margin-top: 4px; font-size: 0.82rem; color: #666; word-break: break-all; }
        .btn-row { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .btn-link {
            display: inline-block;
            text-decoration: none;
            text-align: center;
        }
        .hint-nfc { margin-top: 8px; font-size: 0.8rem; color: #666; line-height: 1.4; }
    </style>
</head>
<body>
    <div id="gate" class="card" style="display:none;">
        <p class="muted">Нет привязанных квартир.</p>
    </div>

    <div id="main" style="display:none;">
        <div class="card">
            <h1>Ключи квартиры</h1>
            <label for="flatSel">Квартира</label>
            <select id="flatSel"></select>
            <div style="margin-top:8px;">
                <button type="button" id="reload" class="secondary">Обновить</button>
            </div>
        </div>

        <div class="card">
            <h2 style="margin-top:0;">В квартире</h2>
            <div id="codeWatchWrap"></div>
            <ul class="keys" id="keyList"></ul>
            <p id="listErr" class="err"></p>
        </div>

        <div class="card" id="addCard" style="display:none;">
            <h2 style="margin-top:0;">Добавить</h2>
            <div class="row2">
                <div>
                    <label for="rfidIn">RFID</label>
                    <input type="text" id="rfidIn" autocomplete="off" inputmode="text">
                </div>
                <div>
                    <label for="commentIn">Комментарий</label>
                    <input type="text" id="commentIn" maxlength="128" autocomplete="off">
                </div>
            </div>
            <div class="btn-row">
                <button type="button" id="addBtn">Добавить</button>
                <a id="nfcScanBtn" class="secondary btn-link" href="#" target="_blank" rel="noopener noreferrer" style="display:none;">Сканировать NFC</a>
            </div>
            <p id="nfcHint" class="hint-nfc" style="display:none;">После сканирования вернитесь сюда и нажмите «Обновить».</p>
            <p id="addErr" class="err"></p>
        </div>
    </div>

    <script src="keys-common.js"></script>
    <script>
        (function () {
            var flats = [];
            var uiState = {
                doorCode: null,
                codeWatched: false,
                codeWatcherId: null
            };

            function errLabel(code) {
                var m = {
                    not_in_catalog: "нет в каталоге",
                    duplicate: "уже привязан",
                    invalid_rfid: "неверный RFID",
                    add_failed: "ошибка записи",
                    comments_too_long: "комментарий слишком длинный"
                };
                return m[code] || code;
            }

            function loadFlats() {
                postLoadingStarted();
                return keysApiFetch("/mobile/address/getSettingsList", {}).then(function (r) {
                    var j = r.json;
                    if (j.code !== 200 || !j.data) {
                        throw new Error(j.message || "Не удалось загрузить квартиры");
                    }
                    flats = j.data || [];
                    if (!flats.length) {
                        document.getElementById("gate").style.display = "block";
                        document.getElementById("main").style.display = "none";
                        return;
                    }
                    document.getElementById("gate").style.display = "none";
                    document.getElementById("main").style.display = "block";
                    var sel = document.getElementById("flatSel");
                    sel.innerHTML = "";
                    flats.forEach(function (f) {
                        var opt = document.createElement("option");
                        opt.value = String(f.flatId);
                        opt.textContent = (f.address || "") + " (кв. " + (f.flatNumber || "") + ")";
                        sel.appendChild(opt);
                    });
                    document.getElementById("addCard").style.display = "block";
                    refreshNfcOpenLinks();
                    return loadKeys(true);
                }).finally(function () {
                    postLoadingFinished();
                });
            }

            function currentFlatId() {
                return parseInt(document.getElementById("flatSel").value, 10);
            }

            function setWatch(checked, payload) {
                if (checked) {
                    return keysApiFetch("/mobile/address/watch", payload).then(function (r) {
                        var j = r.json || {};
                        if (j.code && j.code !== 200) {
                            throw new Error(j.message || "Не удалось включить уведомление");
                        }
                        return j.data || {};
                    });
                }
                if (!payload.watcherId) {
                    return Promise.resolve({});
                }
                return keysApiFetch("/mobile/address/unwatch", { watcherId: payload.watcherId }).then(function (r) {
                    var j = r.json || {};
                    if (j.code && j.code !== 200) {
                        throw new Error(j.message || "Не удалось выключить уведомление");
                    }
                    return {};
                });
            }

            function renderCodeWatch() {
                var wrap = document.getElementById("codeWatchWrap");
                wrap.innerHTML = "";
                if (!uiState.doorCode) {
                    return;
                }

                var box = document.createElement("div");
                box.className = "code-watch";

                var title = document.createElement("p");
                title.className = "code-watch-title";
                title.textContent = "Код двери";
                box.appendChild(title);

                var code = document.createElement("p");
                code.className = "code-watch-value";
                code.textContent = uiState.doorCode;
                box.appendChild(code);

                var row = document.createElement("div");
                row.className = "watch-row";
                var checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.checked = !!uiState.codeWatched;
                row.appendChild(checkbox);
                var label = document.createElement("label");
                label.className = "watch-label";
                label.textContent = "Уведомлять о проходе по коду";
                row.appendChild(label);
                box.appendChild(row);

                var err = document.createElement("p");
                err.className = "err";
                box.appendChild(err);

                checkbox.addEventListener("change", function () {
                    var next = checkbox.checked;
                    var prev = !next;
                    checkbox.disabled = true;
                    err.textContent = "";

                    postLoadingStarted();
                    setWatch(next, {
                        flatId: currentFlatId(),
                        eventType: 6,
                        eventDetail: uiState.doorCode,
                        comments: "Код двери",
                        watcherId: uiState.codeWatcherId
                    }).then(function (data) {
                        uiState.codeWatched = next;
                        if (next && data.watcherId) {
                            uiState.codeWatcherId = parseInt(data.watcherId, 10) || uiState.codeWatcherId;
                        }
                        if (!next) {
                            uiState.codeWatcherId = null;
                        }
                    }).catch(function (e) {
                        checkbox.checked = prev;
                        err.textContent = e.message || "Ошибка";
                    }).finally(function () {
                        checkbox.disabled = false;
                        postLoadingFinished();
                    });
                });

                wrap.appendChild(box);
            }

            function renderKeyRow(k) {
                var li = document.createElement("li");
                li.setAttribute("data-key-id", String(k.keyId));
                li.setAttribute("data-watcher-id", k.watcherId ? String(k.watcherId) : "");
                var c0 = (k.comments || "").trim();

                var rf = document.createElement("div");
                rf.className = "rfid-line";
                rf.textContent = k.rfId;
                li.appendChild(rf);

                var cdiv = document.createElement("div");
                cdiv.className = "cmt muted";
                cdiv.textContent = c0 || "—";
                li.appendChild(cdiv);

                var watchRow = document.createElement("div");
                watchRow.className = "watch-row";
                var watchCb = document.createElement("input");
                watchCb.type = "checkbox";
                watchCb.checked = !!k.watched;
                watchRow.appendChild(watchCb);
                var watchLbl = document.createElement("label");
                watchLbl.className = "watch-label";
                watchLbl.textContent = "Уведомлять о проходе";
                watchRow.appendChild(watchLbl);
                li.appendChild(watchRow);

                var watchErr = document.createElement("p");
                watchErr.className = "err";
                li.appendChild(watchErr);

                var tb = document.createElement("div");
                tb.style.marginTop = "6px";
                var toggle = document.createElement("button");
                toggle.type = "button";
                toggle.className = "linkish edit-toggle";
                toggle.textContent = "Комментарий";
                tb.appendChild(toggle);
                li.appendChild(tb);

                var editRow = document.createElement("div");
                editRow.className = "edit-row";
                var inp = document.createElement("input");
                inp.type = "text";
                inp.className = "edit-inp";
                inp.maxLength = 128;
                inp.value = c0;
                editRow.appendChild(inp);
                var saveBtn = document.createElement("button");
                saveBtn.type = "button";
                saveBtn.className = "secondary save-cmt";
                saveBtn.style.marginTop = "6px";
                saveBtn.textContent = "Сохранить";
                editRow.appendChild(saveBtn);
                var errP = document.createElement("p");
                errP.className = "edit-err err";
                editRow.appendChild(errP);
                li.appendChild(editRow);

                toggle.addEventListener("click", function () {
                    editRow.classList.toggle("open");
                    if (editRow.classList.contains("open")) {
                        inp.focus();
                    }
                });
                saveBtn.addEventListener("click", function () {
                    errP.textContent = "";
                    var flatId = currentFlatId();
                    var keyId = parseInt(li.getAttribute("data-key-id"), 10);
                    var comments = (inp.value || "").trim();
                    postLoadingStarted();
                    keysApiFetch("/mobile/keys/updateKeyComment", {
                        flatId: flatId,
                        keyId: keyId,
                        comments: comments
                    }).then(function (r) {
                        var j = r.json;
                        if (j.code !== 200) {
                            errP.textContent = j.message || "Ошибка";
                            return;
                        }
                        editRow.classList.remove("open");
                        loadKeys(false);
                    }).catch(function (e) {
                        errP.textContent = e.message || "Сеть";
                    }).finally(function () {
                        postLoadingFinished();
                    });
                });

                watchCb.addEventListener("change", function () {
                    var next = watchCb.checked;
                    var prev = !next;
                    var watcherId = parseInt(li.getAttribute("data-watcher-id"), 10) || null;
                    watchCb.disabled = true;
                    watchErr.textContent = "";

                    postLoadingStarted();
                    setWatch(next, {
                        flatId: currentFlatId(),
                        eventType: 3,
                        eventDetail: k.rfId,
                        comments: c0 || k.rfId,
                        watcherId: watcherId
                    }).then(function (data) {
                        if (next && data.watcherId) {
                            li.setAttribute("data-watcher-id", String(data.watcherId));
                        }
                        if (!next) {
                            li.setAttribute("data-watcher-id", "");
                        }
                    }).catch(function (e) {
                        watchCb.checked = prev;
                        watchErr.textContent = e.message || "Ошибка";
                    }).finally(function () {
                        watchCb.disabled = false;
                        postLoadingFinished();
                    });
                });
                return li;
            }

            function loadKeys(skipLoading) {
                var flatId = currentFlatId();
                var listEl = document.getElementById("keyList");
                var errEl = document.getElementById("listErr");
                errEl.textContent = "";
                listEl.innerHTML = "";
                if (!skipLoading) {
                    postLoadingStarted();
                }
                return keysApiFetch("/mobile/keys/listForFlat", { flatId: flatId }).then(function (r) {
                    var j = r.json;
                    if (j.code !== 200) {
                        errEl.textContent = j.message || "Ошибка";
                        return;
                    }
                    var data = j.data || {};
                    var keys = Array.isArray(data.keys) ? data.keys : [];
                    uiState.doorCode = data.doorCode || null;
                    uiState.codeWatched = !!data.codeWatched;
                    uiState.codeWatcherId = data.codeWatcherId || null;
                    renderCodeWatch();
                    if (!keys.length) {
                        listEl.innerHTML = "<li class=\"muted\">Пусто</li>";
                    } else {
                        keys.forEach(function (k) {
                            listEl.appendChild(renderKeyRow(k));
                        });
                    }
                }).catch(function (e) {
                    errEl.textContent = e.message;
                }).finally(function () {
                    if (!skipLoading) {
                        postLoadingFinished();
                    }
                });
            }

            document.getElementById("reload").addEventListener("click", function () { loadKeys(false); });
            document.getElementById("flatSel").addEventListener("change", function () { loadKeys(false); });

            function refreshNfcOpenLinks() {
                var flatId = currentFlatId();
                var nfcLink = document.getElementById("nfcScanBtn");
                if (!Number.isFinite(flatId) || flatId <= 0) {
                    if (nfcLink) {
                        nfcLink.href = "#";
                    }
                    return false;
                }
                var com = (document.getElementById("commentIn").value || "").trim();
                return applyNfcScanLinks(
                    flatId,
                    com,
                    nfcLink,
                    null,
                    null
                );
            }

            function initNfcScanUi() {
                var nfcBtn = document.getElementById("nfcScanBtn");
                var nfcHint = document.getElementById("nfcHint");
                if (!_keysIsAndroid) {
                    return;
                }
                nfcBtn.style.display = "inline-block";
                nfcHint.style.display = "block";

                nfcBtn.addEventListener("click", function (e) {
                    var errEl = document.getElementById("addErr");
                    errEl.textContent = "";
                    if (!refreshNfcOpenLinks()) {
                        e.preventDefault();
                        errEl.textContent = "Сначала выберите квартиру";
                    }
                });
                document.getElementById("flatSel").addEventListener("change", function () {
                    refreshNfcOpenLinks();
                });
                refreshNfcOpenLinks();
            }

            document.getElementById("addBtn").addEventListener("click", function () {
                var errEl = document.getElementById("addErr");
                errEl.textContent = "";
                var flatId = currentFlatId();
                var rf = normalizeRfidJoinFlat((document.getElementById("rfidIn").value || "").trim());
                var com = (document.getElementById("commentIn").value || "").trim();
                if (!rf) {
                    errEl.textContent = "Укажите корректный RFID (1-14 HEX, недостающие нули будут добавлены)";
                    return;
                }
                postLoadingStarted();
                keysApiFetch("/mobile/keys/batchAdd", {
                    flatId: flatId,
                    keys: [ { rfId: rf, comments: com } ]
                }).then(function (r) {
                    var j = r.json;
                    if (j.code !== 200 || !j.data || !j.data.results || !j.data.results[0]) {
                        errEl.textContent = (j && j.message) ? j.message : "Ошибка";
                        return;
                    }
                    var row = j.data.results[0];
                    if (!row.ok) {
                        errEl.textContent = errLabel(row.error || "");
                        return;
                    }
                    document.getElementById("rfidIn").value = "";
                    document.getElementById("commentIn").value = "";
                    loadKeys(false);
                }).catch(function (e) {
                    errEl.textContent = e.message || "Сеть";
                }).finally(function () {
                    postLoadingFinished();
                });
            });

            document.addEventListener("DOMContentLoaded", function () {
                initNfcScanUi();
                postLoadingStarted();
                loadFlats().catch(function (e) {
                    document.getElementById("gate").style.display = "block";
                    document.getElementById("main").style.display = "none";
                    document.getElementById("gate").querySelector("p").textContent = e.message;
                }).finally(function () {
                    postLoadingFinished();
                });
            });
        })();
    </script>
</body>
</html>
